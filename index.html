<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח שנה — ישיבת בני עקיבא עלי</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f4f1eb; --surf:#fff; --border:#ddd8cc; --text:#1c1812; --muted:#7a7269;
  --acc:#2c5f2e; --acc2:#c47b1a; --hdr:#1c1812;
  --sh:0 2px 12px rgba(0,0,0,.07); --sh-lg:0 8px 32px rgba(0,0,0,.14);
  --chag:#7a3a00; --pad:#1a3a6b; --hev:#2c5f2e; --pni:#7a2030; --ris:#4a4a6a; --tzvet:#5a4520; --bag:#5a1a7a;
  --gz:#b55a00; --gh:#006080; --gt:#5a006b; --gy:#006b3a; --gya:#8b0000; --gyb:#00468b;
  --chatav:#c47b1a; --tichon:#1a5c8a;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;}

/* ── HEADER ── */
.header{background:var(--hdr);color:#fff;height:58px;padding:0 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.35);}
.logo-wrap{display:flex;align-items:center;gap:8px;}
.school-logo{height:50px;width:auto;}
.hdr-right{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.today-pill{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:3px 11px;font-size:.72rem;color:rgba(255,255,255,.8);white-space:nowrap;}
.edit-pill{background:#fef3cd;border:1.5px solid #f0c030;color:#7a5a00;border-radius:6px;padding:2px 8px;font-size:.7rem;font-weight:700;}

/* ── BUTTONS ── */
.btn{padding:5px 13px;border:none;border-radius:6px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.79rem;font-weight:600;transition:all .15s;white-space:nowrap;}
.btn-ghost{background:transparent;border:1.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.8);}
.btn-ghost:hover{background:rgba(255,255,255,.1);}
.btn-gold{background:var(--acc2);color:#fff;} .btn-gold:hover{background:#b36e15;}
.btn-red{background:#b52828;color:#fff;}
.btn-green{background:var(--acc);color:#fff;}
.btn-excel{background:#1d6f42;color:#fff;} .btn-excel:hover{background:#155230;}

/* ── YEAR STRIP ── */
.year-strip{background:var(--surf);border-bottom:2px solid var(--border);padding:0 18px;display:flex;align-items:center;position:sticky;top:58px;z-index:150;}
.yr-btn{padding:13px 20px;border:none;background:transparent;font-family:'Heebo',sans-serif;font-size:.9rem;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;}
.yr-btn.active{color:var(--acc);border-bottom-color:var(--acc);}
.yr-btn:hover:not(.active){color:var(--text);}
.tabs-sep{width:1px;height:20px;background:var(--border);margin:0 6px;align-self:center;}
.tab-btn{padding:13px 18px;border:none;background:transparent;font-family:'Heebo',sans-serif;font-size:.86rem;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;}
.tab-btn.active{color:var(--acc2);border-bottom-color:var(--acc2);}
.strip-spacer{flex:1;}

/* ── LAYERS BAR ── */
.layers-bar{background:var(--surf);border-bottom:1px solid var(--border);padding:8px 18px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.lbl{font-size:.7rem;font-weight:700;color:var(--muted);white-space:nowrap;}
.chip{padding:4px 11px;border-radius:20px;border:2px solid;font-size:.72rem;font-weight:700;cursor:pointer;transition:all .15s;user-select:none;opacity:.38;}
.chip.on{opacity:1;}
.chip[data-l="מעגל השנה"]{border-color:var(--chag);color:var(--chag);} .chip[data-l="מעגל השנה"].on{background:var(--chag);color:#fff;}
.chip[data-l="פדגוגי"]{border-color:var(--pad);color:var(--pad);} .chip[data-l="פדגוגי"].on{background:var(--pad);color:#fff;}
.chip[data-l="חברתי"]{border-color:var(--hev);color:var(--hev);} .chip[data-l="חברתי"].on{background:var(--hev);color:#fff;}
.chip[data-l="רישום"]{border-color:var(--ris);color:var(--ris);} .chip[data-l="רישום"].on{background:var(--ris);color:#fff;}
.chip[data-l="פנימיה"]{border-color:var(--pni);color:var(--pni);} .chip[data-l="פנימיה"].on{background:var(--pni);color:#fff;}
.chip[data-l="צוות"]{border-color:var(--tzvet);color:var(--tzvet);} .chip[data-l="צוות"].on{background:var(--tzvet);color:#fff;}
.chip[data-l="בגרויות ומתכונות"]{border-color:var(--bag);color:var(--bag);} .chip[data-l="בגרויות ומתכונות"].on{background:var(--bag);color:#fff;}
.chip[data-l="חטב"]{border-color:var(--chatav);color:var(--chatav);} .chip[data-l="חטב"].on{background:var(--chatav);color:#fff;}
.chip[data-l="תיכון"]{border-color:var(--tichon);color:var(--tichon);} .chip[data-l="תיכון"].on{background:var(--tichon);color:#fff;}
.chip[data-l="שכבת ז"]{border-color:var(--gz);color:var(--gz);} .chip[data-l="שכבת ז"].on{background:var(--gz);color:#fff;}
.chip[data-l="שכבת ח"]{border-color:var(--gh);color:var(--gh);} .chip[data-l="שכבת ח"].on{background:var(--gh);color:#fff;}
.chip[data-l="שכבת ט"]{border-color:var(--gt);color:var(--gt);} .chip[data-l="שכבת ט"].on{background:var(--gt);color:#fff;}
.chip[data-l="שכבת י"]{border-color:var(--gy);color:var(--gy);} .chip[data-l="שכבת י"].on{background:var(--gy);color:#fff;}
.chip[data-l='שכבת י"א']{border-color:var(--gya);color:var(--gya);} .chip[data-l='שכבת י"א'].on{background:var(--gya);color:#fff;}
.chip[data-l='שכבת י"ב']{border-color:var(--gyb);color:var(--gyb);} .chip[data-l='שכבת י"ב'].on{background:var(--gyb);color:#fff;}
.ldiv{width:1px;height:20px;background:var(--border);margin:0 3px;}
.lctrl{padding:3px 9px;border-radius:20px;font-size:.68rem;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);transition:all .15s;}
.lctrl:hover{border-color:var(--text);color:var(--text);}

/* ── SEARCH BAR ── */
.search-bar{background:var(--bg);padding:8px 18px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.sw{position:relative;flex:1;max-width:320px;}
.sw input{width:100%;padding:7px 30px 7px 9px;border:1.5px solid var(--border);border-radius:8px;font-family:'Heebo',sans-serif;font-size:.84rem;background:var(--surf);outline:none;direction:rtl;text-align:right;}
.sw input:focus{border-color:var(--acc);}
.sw .ico{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;}
.msel{padding:6px 8px;border:1.5px solid var(--border);border-radius:8px;font-family:'Heebo',sans-serif;font-size:.81rem;background:var(--surf);outline:none;cursor:pointer;}
.jump-now{font-size:.78rem;font-weight:600;color:var(--acc);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:'Heebo',sans-serif;}

/* ── MAIN ── */
.main{padding:14px 18px;max-width:1500px;margin:0 auto;}

/* ── PAST WEEKS BUTTON ── */
.past-bar{text-align:center;margin-bottom:14px;}
.past-btn{padding:7px 22px;background:var(--surf);border:1.5px solid var(--border);border-radius:8px;font-family:'Heebo',sans-serif;font-size:.82rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s;}
.past-btn:hover{border-color:var(--acc);color:var(--acc);}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,#1a1410 0%,#1c3a1e 60%,#1a1410 100%);border-radius:14px;padding:18px 20px;margin-bottom:20px;color:#fff;box-shadow:0 6px 32px rgba(0,0,0,.28);}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.hero-badge{display:inline-block;background:var(--acc2);border-radius:7px;padding:4px 12px;font-size:.68rem;font-weight:800;margin-bottom:7px;}
.hero-range{font-size:1.1rem;font-weight:800;}
.hero-sec{font-size:.75rem;color:var(--acc2);font-weight:600;margin-top:2px;}
.hero-month{font-size:.68rem;color:rgba(255,255,255,.4);margin-top:2px;}
.hero-share{font-size:.65rem;color:rgba(255,255,255,.35);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;padding:5px 11px;}
.hero-days{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;}
.hday{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:9px 7px;min-height:80px;animation:fadeUp .35s ease both;}
.hday.today-day{background:rgba(196,123,26,.2)!important;border-color:var(--acc2)!important;}
.hday-name{font-size:.82rem;font-weight:800;color:rgba(255,255,255,.65);}
.hday-heb{font-size:.86rem;font-weight:800;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hday-sec{font-size:.7rem;color:var(--acc2);font-weight:600;margin-bottom:5px;}
.hday-evs{display:flex;flex-direction:column;gap:2px;}
.hday-ev{font-size:.63rem;color:rgba(255,255,255,.82);display:flex;align-items:flex-start;gap:3px;line-height:1.3;}
.hday-dot{flex-shrink:0;width:5px;height:5px;border-radius:50%;margin-top:3px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.hday:nth-child(1){animation-delay:.04s}.hday:nth-child(2){animation-delay:.08s}.hday:nth-child(3){animation-delay:.12s}
.hday:nth-child(4){animation-delay:.16s}.hday:nth-child(5){animation-delay:.2s}.hday:nth-child(6){animation-delay:.24s}.hday:nth-child(7){animation-delay:.28s}

/* ── YEAR DIVIDER in schedule ── */
.year-divider{background:var(--hdr);color:#fff;border-radius:10px;padding:10px 18px;margin:24px 0 14px;display:flex;align-items:center;gap:12px;font-size:1rem;font-weight:800;}
.year-divider em{color:var(--acc2);font-style:normal;}

/* ── MONTH ── */
.month-sec{margin-bottom:28px;}
.month-head{font-size:.96rem;font-weight:800;color:var(--acc);padding:6px 0 8px;border-bottom:2px solid var(--acc);margin-bottom:10px;}

/* ── WEEK BLOCK ── */
.week-block{background:var(--surf);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:8px;box-shadow:var(--sh);scroll-margin-top:200px;}
.week-block.cur-week{border:2.5px solid var(--acc2);box-shadow:0 0 0 3px rgba(196,123,26,.1),var(--sh-lg);}
.week-block.past-week{opacity:.6;}

.week-head{display:grid;grid-template-columns:90px repeat(7,1fr);background:var(--hdr);}
.wh-lbl{display:flex;align-items:center;justify-content:center;font-size:.58rem;color:rgba(255,255,255,.3);font-weight:600;padding:8px 2px;border-left:1px solid rgba(255,255,255,.06);}
.wh-day{padding:7px 4px;text-align:center;border-right:1px solid rgba(255,255,255,.06);}
.wh-day.shab .wh-heb{color:#a8e6b0;}
.wh-name{font-size:.65rem;color:rgba(255,255,255,.35);font-weight:600;}
.wh-heb{font-size:.82rem;font-weight:800;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wh-sec{font-size:.76rem;color:var(--acc2);font-weight:700;}
.today-dot{display:inline-block;width:5px;height:5px;background:var(--acc2);border-radius:50%;margin-left:2px;vertical-align:middle;}

.cat-row{display:grid;grid-template-columns:90px repeat(7,1fr);border-top:1px solid var(--border);transition:opacity .2s;}
.cat-row.hidden{display:none;}
.cat-lbl{display:flex;align-items:center;justify-content:center;padding:5px 3px;font-size:.63rem;font-weight:800;color:#fff;text-align:center;border-left:1px solid rgba(255,255,255,.15);}
.cl-chag{background:var(--chag);} .cl-pad{background:var(--pad);} .cl-hev{background:var(--hev);}
.cl-pni{background:var(--pni);} .cl-ris{background:var(--ris);} .cl-tzvet{background:var(--tzvet);} .cl-bag{background:var(--bag);}

.ecell{padding:5px 5px;min-height:36px;border-right:1px solid var(--border);font-size:.7rem;line-height:1.4;vertical-align:top;position:relative;}
.ecell:last-child{border-right:none;}
.ecell.hol{background:#fff5f5;} .ecell.shab-c{background:#f2fbf3;}
.ecell.editable{cursor:pointer;} .ecell.editable:hover{background:#fffbf0!important;outline:2px dashed var(--acc2);outline-offset:-2px;}
.ecell.drag-over{background:#fffbf0!important;outline:2px dashed var(--acc2)!important;}
.ecell.selected{outline:2.5px solid var(--acc2);background:#fffbf0!important;box-shadow:0 0 0 3px rgba(196,123,26,.15);}
.ev-item-row.item-selected{background:rgba(196,123,26,.15);border-radius:4px;outline:1.5px solid var(--acc2);}

.etag{display:inline-block;border-radius:3px;padding:2px 5px;font-size:.67rem;font-weight:700;margin:1px;line-height:1.4;}
.et-gen{background:#edf3ff;color:#1a3a6b;} .et-hol{background:#fdecea;color:#7a1a1a;}
.et-shab{background:#e8f5e9;color:#1a4a1a;} .et-exam{background:#f3e5f5;color:#5a1a6b;}

.gbadges{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px;}
.gb{display:inline-block;border-radius:3px;padding:1px 5px;font-size:.59rem;font-weight:700;color:#fff;}
.gb-chatav{background:var(--chatav);} .gb-tichon{background:var(--tichon);}
.gb-z{background:var(--gz);} .gb-h{background:var(--gh);} .gb-t{background:var(--gt);}
.gb-y{background:var(--gy);} .gb-ya{background:var(--gya);} .gb-yb{background:var(--gyb);}

.ev-item-card{background:#f9f7f3;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;position:relative;}
.ev-item-card .del-btn{position:absolute;top:6px;left:6px;background:none;border:none;color:#b52828;cursor:pointer;font-size:.85rem;padding:2px 5px;border-radius:4px;}
.ev-item-card .del-btn:hover{background:#fdecea;}
.ev-item-num{font-size:.7rem;font-weight:800;color:var(--muted);margin-bottom:6px;}
.copy-btn{position:absolute;top:2px;left:2px;font-size:.6rem;color:var(--muted);cursor:pointer;opacity:0;transition:opacity .15s;background:none;border:none;padding:1px 3px;}
.ecell:hover .copy-btn{opacity:1;}

/* ── EXAM TABLE ── */
.exam-wrap{overflow-x:auto;margin-bottom:9px;}
.exam-tbl{width:100%;border-collapse:collapse;font-size:.7rem;min-width:580px;box-shadow:var(--sh);}
.exam-tbl th{background:var(--hdr);color:#fff;padding:7px;text-align:center;font-weight:600;font-size:.67rem;border-right:1px solid rgba(255,255,255,.08);white-space:nowrap;}
.exam-tbl td{padding:6px;border:1px solid var(--border);text-align:center;vertical-align:top;min-width:65px;}
.exam-tbl td.grd-td{background:#1a0a30;color:#fff;font-weight:700;font-size:.67rem;}
.exam-tbl td.ex-c{background:#faf0ff;} .exam-tbl td.bg-c{background:#fff0e8;}
.exam-tbl tr.hidden{display:none;}

/* ── MODALS ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:var(--surf);border-radius:13px;padding:24px 28px;width:390px;max-width:95vw;box-shadow:var(--sh-lg);}
.modal h3{font-size:1rem;font-weight:800;margin-bottom:14px;}
.fl{font-size:.76rem;font-weight:700;color:var(--muted);margin-bottom:4px;}
.fi{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;font-family:'Heebo',sans-serif;font-size:.86rem;outline:none;direction:rtl;text-align:right;margin-bottom:11px;}
.fi:focus{border-color:var(--acc);}
.ck-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:11px;}
.ck-item{display:flex;align-items:center;gap:4px;cursor:pointer;font-size:.78rem;font-weight:600;}
.mact{display:flex;gap:8px;margin-top:4px;} .mact .btn{flex:1;}
.login-modal{width:310px;text-align:center;}
.login-modal p{color:var(--muted);font-size:.81rem;margin-bottom:16px;}
#pw-err{color:#b52828;font-size:.78rem;margin-top:6px;display:none;}

/* ── STATUS ── */
.edit-toolbar{position:fixed;bottom:0;left:0;right:0;background:var(--hdr);padding:6px 12px;display:none;align-items:center;gap:6px;z-index:101;flex-wrap:wrap;}
.edit-toolbar.show{display:flex;}
.tb-btn{padding:5px 12px;border:none;border-radius:6px;font-family:'Heebo',sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;background:rgba(255,255,255,.12);color:#fff;transition:all .15s;}
.tb-btn:hover{background:rgba(255,255,255,.22);}
.tb-btn.tb-del{background:rgba(181,40,40,.7);}
.tb-btn.tb-edit{background:var(--acc2);}
.status{position:fixed;bottom:0;left:0;right:0;background:var(--hdr);color:rgba(255,255,255,.8);padding:6px 18px;font-size:.74rem;display:flex;align-items:center;gap:12px;z-index:100;transform:translateY(100%);transition:transform .3s;}
.status.show{transform:translateY(0);}

@media(max-width:768px){
  .header,.year-strip,.layers-bar,.search-bar,.main{padding-right:10px;padding-left:10px;}
  .week-head,.cat-row{grid-template-columns:58px repeat(7,1fr);}
  .cat-lbl{font-size:.5rem;padding:3px 1px;}
  .hero-days{grid-template-columns:repeat(4,1fr);}
}
</style>
</head>

// ── UNDO/REDO ──
// Stack-based: _undoStack holds snapshots BEFORE each change
// _redoStack holds snapshots for redo
let _undoStack = [];
let _redoStack = [];
const MAX_HISTORY = 50;

function saveHistory() {
  // Save current state BEFORE a change happens
  _undoStack.push(JSON.stringify(edits));
  if(_undoStack.length > MAX_HISTORY) _undoStack.shift();
  _redoStack = []; // clear redo on new action
}

function undo() {
  if(!_undoStack.length) { showStatus('אין פעולה לביטול'); return; }
  _redoStack.push(JSON.stringify(edits)); // save current for redo
  edits = JSON.parse(_undoStack.pop());
  persist(); render(); showStatus('↩️ בוטל');
}

function redo() {
  if(!_redoStack.length) { showStatus('אין פעולה להחזרה'); return; }
  _undoStack.push(JSON.stringify(edits)); // save current for undo
  edits = JSON.parse(_redoStack.pop());
  persist(); render(); showStatus('↪️ הוחזר');
}
// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if(!isEditor) return;
  const tag = document.activeElement?.tagName;
  const inInput = tag==='INPUT' || tag==='TEXTAREA';

  // Undo: Ctrl+Z
  if((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey) {
    e.preventDefault(); undo(); return;
  }
  // Redo: Ctrl+Y or Ctrl+Shift+Z
  if((e.ctrlKey||e.metaKey) && (e.key==='y' || (e.key==='z' && e.shiftKey))) {
    e.preventDefault(); redo(); return;
  }

  // Cell operations — only when cell selected and not typing
  const _selKey = typeof selectedCell==='object' ? selectedCell?.key : selectedCell;
  if(!_selKey || inInput) return;

  // Delete / Backspace
  if(e.key==='Delete' || e.key==='Backspace') {
    e.preventDefault();
    deleteSelectedCell();
    return;
  }
  // Cut: Ctrl+X
  if((e.ctrlKey||e.metaKey) && e.key==='x') {
    e.preventDefault();
    clipboard = { items: JSON.parse(JSON.stringify(getCellItems(selectedCell, getOriginalVal(selectedCell)))) };
    saveHistory();
    setCellItems(selectedCell, []);
    clearSelection(); persist(); render();
    showStatus('✂️ גזור');
    return;
  }
  // Copy: Ctrl+C
  if((e.ctrlKey||e.metaKey) && e.key==='c') {
    e.preventDefault();
    clipboard = { items: JSON.parse(JSON.stringify(getCellItems(selectedCell, getOriginalVal(selectedCell)))) };
    showStatus('📋 הועתק');
    return;
  }
  // Paste: Ctrl+V
  if((e.ctrlKey||e.metaKey) && e.key==='v') {
    e.preventDefault();
    if(!clipboard || !clipboard.items || !clipboard.items.length) {
      showStatus('אין תוכן בלוח'); return;
    }
    saveHistory();
    const existing = getCellItems(selectedCell, getOriginalVal(selectedCell));
    setCellItems(selectedCell, [...existing, ...clipboard.items]);
    persist(); render();
    showStatus('📌 הודבק');
    return;
  }
  // Escape
  if(e.key==='Escape') { clearSelection(); }
}, {capture: true});



function deleteSelectedCell() {
  if(!selectedCell) return;
  saveHistory();
  if(typeof selectedCell === 'object' && selectedCell.itemIdx !== null && selectedCell.itemIdx !== undefined) {
    // Delete single item
    const {key, itemIdx} = selectedCell;
    const items = getCellItems(key, getOriginalVal(key));
    items.splice(itemIdx, 1);
    setCellItems(key, items);
  } else {
    // Delete whole cell
    const key = typeof selectedCell === 'object' ? selectedCell.key : selectedCell;
    setCellItems(key, []);
  }
  clearSelection();
  persist();
  showStatus('🗑️ נמחק');
  render();
}

function parseDate(s) {
  if(!s) return null;
  const m = s.match(/(\d{2})\.(\d{2})/);
  if(!m) return null;
  const d=+m[1], mo=+m[2];
  const y = mo<=7 ? (mo<=7&&mo>=1?2027:2026) : 2025;
  // Better: determine year from context
  if(mo>=8) return new Date(mo>=8?2025:2026, mo-1, d);
  return new Date(2026+(mo<=7?1:0), mo-1, d);
}

function parseDateFull(s) {
  // More robust: try multiple years
  if(!s) return null;
  const m = s.match(/(\d{2})\.(\d{2})/);
  if(!m) return null;
  return { d:+m[1], mo:+m[2] };
}

function isToday(s) {
  const p = parseDateFull(s);
  if(!p) return false;
  const t = new Date();
  return p.d === t.getDate() && p.mo === t.getMonth()+1;
}

function findCurrentWeek() {
  const t = new Date();
  const todayD = t.getDate(), todayM = t.getMonth()+1, todayY = t.getFullYear();
  for(let i=0; i<ALL_SCHED.length; i++) {
    const w = ALL_SCHED[i];
    for(const ds of w.dates) {
      if(!ds) continue;
      const m = ds.match(/(\d{2})\.(\d{2})/);
      if(!m) continue;
      const d=+m[1], mo=+m[2];
      if(d===todayD && mo===todayM) return i;
    }
  }
  // fallback: find closest
  return Math.min(ALL_SCHED.length-1, 28); // default to תשפ"ו middle
}

function toggleLayer(el) {
  // dataset.l may have &quot; encoded - decode for activeLayers key
  const l = (el.dataset.l||'').replace(/&quot;/g,'"');
  if(activeLayers.has(l)) activeLayers.delete(l); else activeLayers.add(l);
  el.classList.toggle('on', activeLayers.has(l));
  applyLayers();
}

function toggleGroup(el, group) {
  const grades = group==='חטב' ? CHATAV : TICHON;
  const allOn = grades.every(g=>activeLayers.has(g));
  grades.forEach(g => {
    if(allOn) activeLayers.delete(g); else activeLayers.add(g);
    // Update individual grade chips
    document.querySelectorAll('.chip').forEach(c=>{
      const dl = c.dataset.l||'';
      if(dl===g || dl===g.replace(/"/g,'&quot;')) c.classList.toggle('on',!allOn);
    });
  });
  if(allOn) activeLayers.delete(group); else activeLayers.add(group);
  el.classList.toggle('on',!allOn);
  applyLayers();
}

function allLayers() {
  [...CAT_ORDER,...GRADE_LAYERS,'חטב','תיכון'].forEach(l=>activeLayers.add(l));
  document.querySelectorAll('.chip').forEach(c=>c.classList.add('on'));
  applyLayers();
}
function clearLayers() {
  activeLayers.clear();

function classify(t) {
  if(!t||!t.trim()) return '';
  if(t.includes('בגרות')||t.includes('מתכונת')) return 'exam';
  if(t.includes('מבחן')||t.includes('מבדק')) return 'exam';
  if(t.includes('חופשת')||t.includes('פסח')||t.includes('סוכות')||t.includes('חנוכה')||
     t.includes('פורים')||t.includes('ראש השנה')||t.includes('יום כיפור')||
     t.includes('שבועות')||t.includes('שמיני')||t.includes('הושענא')||
     t.includes('תשעה')||t.includes('צום')||t.includes('תענית')) return 'hol';
  if(t.includes('פרשת')||t.includes('שבת')) return 'shab';
  return 'gen';
}
function etag(t) {
  if(!t||!t.trim()) return '';
  const c = classify(t);
  const cls = c==='hol'?'et-hol':c==='shab'?'et-shab':c==='exam'?'et-exam':'et-gen';
  return `<span class="etag ${cls}">${t.trim()}</span>`;
}

function getV(key,fb) { return edits.hasOwnProperty(key)?edits[key]:(fb||''); }
function getLayers(key) { const v=edits['layers_'+key]; return v?v.split(',').filter(Boolean).map(g=>g.replace(/&quot;/g,'"')):[]; }

// Multi-event helpers
function getCellItems(key, fallbackText) {
  if(edits.hasOwnProperty('items_'+key)) {
    try { return JSON.parse(edits['items_'+key]); } catch(e){}
  }
  // Legacy: if has single value, wrap it
  const txt = edits.hasOwnProperty(key) ? edits[key] : (fallbackText||'');
  if(!txt) return [];
  return [{text:txt, layers:getLayers(key), time:edits['time_'+key]||'', loc:edits['loc_'+key]||'', note:edits['note_'+key]||''}];
}
function setCellItems(key, items) {
  if(!items.length) {
    // Save explicit empty marker so getCellItems returns []
    edits['items_'+key] = '[]';
    edits[key] = '';
  } else {
    edits['items_'+key] = JSON.stringify(items);
    edits[key] = items[0].text||'';
  }
}

        const layers = item.layers||[];

        const hasTichon = !layers.length || TICHON.some(g=>layers.includes(g));
        const entry = {cat, text:item.text.trim(), layers, di, key, item};
        if(cat === 'צוות') { dayEvts[di].tzevet.push(entry); }
        else if(!layers.length) { dayEvts[di].all.push(entry); }
        else if(hasChatav && hasTichon) { dayEvts[di].all.push(entry); }
        else if(hasChatav) { dayEvts[di].chatav.push(entry); }
        else if(hasTichon) { dayEvts[di].tichon.push(entry); }
        else { dayEvts[di].all.push(entry); }
      });
    });
  });

  // Find parasha for this week
  const parshaEv = (cw.categories['פדגוגי']||[]).find(v=>v&&v.includes('פרשת'))||
                   (cw.categories['מעגל השנה']||[]).find(v=>v&&v.includes('פרשת'))||'';

  const secRange = `${(cw.dates[0]||'').split(' * ')[1]||''} – ${(cw.dates[6]||'').split(' * ')[1]||''}`;

  // Build week title with parasha
  const weekTitleParasha = parshaEv ? parshaEv.replace('פרשת ','') : '';
  const weekTitle = weekTitleParasha
    ? `עדכון שבועי | פרשת ${weekTitleParasha}`
    : 'עדכון שבועי';

  let heroHtml = `<div id="hero-snapshot">
  <div style="text-align:center;margin-bottom:8px;padding:6px 0 2px">
    <div style="font-size:1.35rem;font-weight:900;color:var(--text);letter-spacing:.01em">${weekTitle}</div>

  </div>
  <div class="hero">
    <div class="hero-top">
      <div style="display:flex;align-items:center;gap:10px">
        <img src="${document.querySelector('.school-logo')?.src||''}" style="height:52px;filter:brightness(0) invert(1);opacity:.9">
        <div>
          <div style="display:flex;align-items:center;gap:8px">
          <button onclick="heroWeekOffset--;render()" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:6px;width:28px;height:28px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">‹</button>
          <div class="hero-badge">📍 השבוע</div>
          <button onclick="heroWeekOffset++;render()" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:6px;width:28px;height:28px;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0">›</button>
        </div>
          <div class="hero-range">${(cw.dates[0]||'').split(' * ')[0]} – ${(cw.dates[6]||'').split(' * ')[0]}</div>
          <div class="hero-sec">${secRange}</div>
          ${parshaEv?`<div style="font-size:.67rem;color:rgba(255,255,255,.5);margin-top:1px">${parshaEv}</div>`:''}
          <div class="hero-month">${cw.month||''} | ${cw.year||''}</div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
        <button onclick="copyHeroSnapshot()" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:7px;padding:5px 11px;font-size:.68rem;cursor:pointer;font-family:Heebo,sans-serif">📸 העתק לשיתוף</button>
        <div style="display:flex;gap:5px;margin-top:4px">
          <button onclick="showFriday=!showFriday;render()" id="tog-fri" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);border-radius:5px;padding:3px 8px;font-size:.63rem;cursor:pointer;font-family:Heebo,sans-serif">שישי ${showFriday?'✓':'✗'}</button>
          <button onclick="showSaturday=!showSaturday;render()" id="tog-sat" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);border-radius:5px;padding:3px 8px;font-size:.63rem;cursor:pointer;font-family:Heebo,sans-serif">שבת ${showSaturday?'✓':'✗'}</button>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:4px">
          <button onclick="sendEmail()" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:7px;padding:5px 10px;font-size:.65rem;cursor:pointer;font-family:Heebo,sans-serif">📧 מייל</button>
          <button onclick="sendWhatsapp()" style="background:rgba(37,211,102,.2);border:1px solid rgba(37,211,102,.4);color:#fff;border-radius:7px;padding:5px 10px;font-size:.65rem;cursor:pointer;font-family:Heebo,sans-serif">💬 וואטסאפ</button>
        </div>
      </div>
    </div>
    <div class="hero-days">`;

  // Compute visible days for grid
  const shownDays = [0,1,2,3,4,...(showFriday?[5]:[]),...(showSaturday?[6]:[])];
  // Font scale: 5 days=bigger, 7 days=smaller
  const nDays = shownDays.length;
  const fScale = nDays<=5 ? 1.18 : nDays===6 ? 1.06 : 1.0;
  heroHtml = heroHtml.replace('class="hero-days">', 'class="hero-days" style="grid-template-columns:repeat('+nDays+',1fr)"'+'>');

  cw.dates.forEach((d,i)=>{
    if(i===5 && !showFriday) return;
    if(i===6 && !showSaturday) return;
    const p=d?d.split(' * '):['',''];
    const td=isToday(d)?' today-day':'';
    const evAll=dayEvts[i];

    let evHTML = '';
    // כולם — general events (no specific audience)
    if(evAll.all.length) {
      evHTML+=evAll.all.map(e=>{
        const evTime = e.item?.time||'';
        const evLoc  = e.item?.loc||'';
        const evNote = e.item?.note||'';
        const metaParts = [
          evTime ? `⏰ ${evTime}` : '',
          evLoc  ? `📍 ${evLoc}`  : '',
        ].filter(Boolean).join('  ');
        const noteEl = `<div style="margin-top:2px">
          ${metaParts ? `<div style="font-size:${(0.6*fScale).toFixed(2)}rem;color:rgba(255,255,255,.6);font-weight:500">${metaParts}</div>` : ''}
          ${evNote ? `<div style="font-size:${(0.58*fScale).toFixed(2)}rem;color:rgba(255,255,255,.45);font-style:italic;font-weight:400">📝 ${evNote}</div>` : ''}
        </div>`;
        return `<div style="margin-bottom:3px"><span class="hday-dot" style="background:${CAT_COLOR[e.cat]||'#666'}"></span><span style="font-size:${(0.63*fScale).toFixed(2)}rem;font-weight:700">${e.text}</span>${noteEl}</div>`;
      }).join('');
    }
    // חטב
    if(evAll.chatav.length) {
      evHTML+=`<div style="font-size:.78rem;font-weight:800;color:var(--chatav);margin-top:3px;border-top:1px solid rgba(255,255,255,.1);padding-top:3px">🔵 חט"ב</div>`;
      evHTML+=evAll.chatav.map(e=>{
        const specificGrades = e.layers.filter(g=>CHATAV.includes(g));
        const gradeTag = specificGrades.length===1 ? `<span style="font-size:.55rem;background:${getGradeColor(specificGrades[0])};color:#fff;border-radius:3px;padding:0 3px;margin-left:2px">${GRADE_LBL[specificGrades[0]]||''}</span>` : '';
        const evTime = e.item?.time||'';
        const evLoc  = e.item?.loc||'';
        const evNote = e.item?.note||'';
        const metaParts = [
          evTime ? `⏰ ${evTime}` : '',
          evLoc  ? `📍 ${evLoc}`  : '',
        ].filter(Boolean).join('  ');
        const noteEl = `<div style="margin-top:2px">
          ${metaParts ? `<div style="font-size:${(0.6*fScale).toFixed(2)}rem;color:rgba(255,255,255,.6);font-weight:500">${metaParts}</div>` : ''}
          ${evNote ? `<div style="font-size:${(0.58*fScale).toFixed(2)}rem;color:rgba(255,255,255,.45);font-style:italic;font-weight:400">📝 ${evNote}</div>` : ''}

    }
    // תיכון
    if(evAll.tichon.length) {
      evHTML+=`<div style="font-size:.78rem;font-weight:800;color:var(--tichon);margin-top:3px;border-top:1px solid rgba(255,255,255,.1);padding-top:3px">🟢 תיכון</div>`;
      evHTML+=evAll.tichon.map(e=>{
        const specificGrades = e.layers.filter(g=>TICHON.includes(g));
        const gradeTag = (specificGrades.length>0 && specificGrades.length<TICHON.length) ? specificGrades.map(g=>`<span style="font-size:.55rem;background:${getGradeColor(g)};color:#fff;border-radius:3px;padding:0 3px;margin-left:1px">${GRADE_LBL[g]||''}</span>`).join('') : '';
        const evTime = e.item?.time||'';
        const evLoc  = e.item?.loc||'';
        const evNote = e.item?.note||'';
        const metaParts = [
          evTime ? `⏰ ${evTime}` : '',
          evLoc  ? `📍 ${evLoc}`  : '',
        ].filter(Boolean).join('  ');
        const noteEl = `<div style="margin-top:2px">
          ${metaParts ? `<div style="font-size:${(0.6*fScale).toFixed(2)}rem;color:rgba(255,255,255,.6);font-weight:500">${metaParts}</div>` : ''}
          ${evNote ? `<div style="font-size:${(0.58*fScale).toFixed(2)}rem;color:rgba(255,255,255,.45);font-style:italic;font-weight:400">📝 ${evNote}</div>` : ''}
        </div>`;
        return `<div style="margin-bottom:3px">${gradeTag}<span class="hday-dot" style="background:${CAT_COLOR[e.cat]||'#666'}"></span><span style="font-size:${(0.63*fScale).toFixed(2)}rem;font-weight:700">${e.text}</span>${noteEl}</div>`;
      }).join('');
    }
    // צוות
    if(evAll.tzevet.length) {
      evHTML+=`<div style="font-size:.78rem;font-weight:800;color:#c4a01a;margin-top:3px;border-top:1px solid rgba(255,255,255,.1);padding-top:3px">⭐ צוות</div>`;
      evHTML+=evAll.tzevet.map(e=>{
        const evTime = e.item?.time||'';
        const evLoc  = e.item?.loc||'';
        const evNote = e.item?.note||'';
        const metaParts = [
          evTime ? `⏰ ${evTime}` : '',
          evLoc  ? `📍 ${evLoc}`  : '',
        ].filter(Boolean).join('  ');
        const noteEl = `<div style="margin-top:2px">
          ${metaParts ? `<div style="font-size:${(0.6*fScale).toFixed(2)}rem;color:rgba(255,255,255,.6);font-weight:500">${metaParts}</div>` : ''}
          ${evNote ? `<div style="font-size:${(0.58*fScale).toFixed(2)}rem;color:rgba(255,255,255,.45);font-style:italic;font-weight:400">📝 ${evNote}</div>` : ''}
        </div>`;
        return `<div style="margin-bottom:3px"><span class="hday-dot" style="background:#c4a01a"></span><span style="font-size:${(0.63*fScale).toFixed(2)}rem;font-weight:700">${e.text}</span>${noteEl}</div>`;
      }).join('');
    }

    const heroNoteHtml = ''; // notes now per-event
    heroHtml+=`<div class="hday${td}" style="animation-delay:${i*.04}s">
      <div class="hday-name" style="font-size:${(0.62*fScale).toFixed(2)}rem">${DAY_EMOJI[i]} ${DAY_NAMES[i]}</div>
      <div class="hday-heb">${isToday(d)?'<span class="today-dot"></span>':''}${p[0]||''}</div>
      <div class="hday-sec">${p[1]||''}</div>
      <div class="hday-evs">${evHTML||'<span style="color:rgba(255,255,255,.2);font-size:.6rem">—</span>'}</div>
      ${heroNoteHtml}
    </div>`;
  });
  heroHtml += '</div></div></div>';

  // ── PAST BUTTON ──
  let pastHtml = '';
  if(!search && ci>0) {
    pastHtml = `<div class="past-bar">
      <button class="past-btn" onclick="showPast=!showPast;render()">
        ${showPast?'🔼 הסתר שבועות קודמים':'🔽 הצג שבועות קודמים ('+ci+' שבועות)'}
      </button>
    </div>`;
  }

  // ── WEEKS ──
  let html = pastHtml + heroHtml;
  let prevYear = '';
  let prevMonth = '';

  ALL_SCHED.forEach((w,wi)=>{
    const isPast = wi < ci;
    if(isPast && !showPast && !search) return;

    // Search filter
    if(search) {
      let found = false;
      CAT_ORDER.forEach(cat=>{
        (w.categories[cat]||[]).forEach((ev,di)=>{
          if(getV(`s-${wi}-${cat}-${di}`,ev).toLowerCase().includes(search)) found=true;
        });
      });
      if(!found) return;
    }

    // Year divider (only between years, not at start)
    if(w.year && w.year!==prevYear && prevYear!=='') {
      html+=`<div class="year-divider" id="year-div-${w.year.replace(/"/g,'')}">
        <span>📅</span> <em>${w.year}</em> — ${w.month.split('(')[1]?.replace(')','').trim()||''}
      </div>`;
      prevYear=w.year;
      prevMonth='';
    } else if(w.year && w.year!==prevYear) {
      prevYear=w.year; // track without showing
    }

    // Month header
    if(w.month && w.month!==prevMonth) {
      html+=`<div class="month-sec" id="month-${wi}"><div class="month-head">📅 ${w.month}</div>`;
      prevMonth=w.month;
    }

    const isCur = wi===ci;
    html+=`<div class="week-block${isCur?' cur-week':''}${isPast?' past-week':''}" id="week-${wi}">`;

    // Date header
    html+=`<div class="week-head"><div class="wh-lbl">שבוע</div>`;
    w.dates.forEach((d,i)=>{
      const p=d?d.split(' * '):['',''];
      html+=`<div class="wh-day${i===6?' shab':''}">
        <div class="wh-name">${DAY_NAMES[i]}</div>
        <div class="wh-heb">${isToday(d)?'<span class="today-dot"></span>':''}${p[0]||''}</div>
        <div class="wh-sec">${p[1]||''}</div>
      </div>`;
    });
    html+=`</div>`;

    // Category rows
    CAT_ORDER.forEach(cat=>{
      const evs = w.categories[cat]||Array(7).fill('');
      const hidden = !activeLayers.has(cat);
      html+=`<div class="cat-row${hidden?' hidden':''}" data-cat="${cat}">`;
      html+=`<div class="cat-lbl ${CAT_CSS[cat]||'cl-tzvet'}">${cat}</div>`;
      evs.forEach((ev,di)=>{
        const key=`s-${wi}-${cat}-${di}`;
        const val=getV(key,ev);
        const c=classify(val);
        const cls=`ecell${c==='hol'?' hol':''}${c==='shab'?' shab-c':''}${isEditor?' editable':''}`;
                const items = getCellItems(key, val);
        const itemsHTML = items.map((item,itemIdx)=>{
          const badges = (item.layers&&item.layers.length) ? renderBadges(item.layers) : '';
          if(isEditor) {
            // Each item draggable individually via handle
            const itemDragKey = key+'__'+itemIdx;
            return `<div class="ev-item-row"
              data-key="${key}" data-item-idx="${itemIdx}"
              draggable="true"
              ondragstart="dragItemStart(event,'${key}',${itemIdx})"
              ondragover="event.stopPropagation();event.preventDefault();this.style.outline='2px dashed var(--acc2)'"
              ondragleave="this.style.outline=''"
              ondrop="dropOnItem(event,'${key}',${itemIdx})"
              style="display:flex;align-items:flex-start;gap:2px;margin-bottom:2px;cursor:pointer;padding:1px 2px;border-radius:3px"
              onclick="event.stopPropagation();selectItem(event,'${key}',${itemIdx})">
              <span style="cursor:grab;color:#ccc;font-size:.7rem;padding:2px 2px 0;flex-shrink:0" title="גרור">⠿</span>
              <div>${etag(item.text)}${badges}</div>
            </div>`;
          }
          return `<div style="margin-bottom:2px">${etag(item.text)}${badges}</div>`;
        }).join('');
        if(isEditor) {
          html+=`<div class="${cls}"
            draggable="true"
            data-key="${key}"
            data-cat="${cat}"
            ondragstart="dragStart(event,'${key}')"
            ondragover="event.preventDefault();this.classList.add('drag-over')"
            ondragleave="this.classList.remove('drag-over')"
            ondrop="doDrop(event,'${key}')">
            ${itemsHTML}
            ${items.length?`<button class="copy-btn" onclick="event.stopPropagation();copyCell('${key}')" title="העתק">⧉</button>`:''}
          </div>`;
        } else {
          html+=`<div class="${cls}">${itemsHTML||''}</div>`;
        }

      });
      html+=`</div>`;
    });

    html+=`</div>`; // week-block

    // Close month section if next week is different month
    const nextW = ALL_SCHED[wi+1];
    if(!nextW || nextW.month!==w.month || nextW.year!==w.year) {
      html+=`</div>`; // month-sec
    }
  });

  document.getElementById('main').innerHTML = html;
  applyLayers();
  updateYearHighlight();

  // Scroll to current week (only on first load)
  if(!search && !showPast && !window._scrolled) {
    window._scrolled = true;
    setTimeout(()=>{
      const el=document.getElementById(`week-${ci}`);
      if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
    },150);
  }
}

function renderExams() {
  const search = document.getElementById('search-in').value.toLowerCase().trim();
  const both = [...EXAMS, ...BAGRUT];
  let html = '<h2 style="font-size:.96rem;font-weight:800;color:var(--acc);margin-bottom:16px">📝 מבחנים ובגרויות</h2>';
  const months={};
  both.forEach((w,wi)=>{
    const m=w.month||'כללי';
    if(!months[m]) months[m]=[];
    months[m].push({w,wi});
  });
  Object.entries(months).forEach(([month,weeks])=>{
    html+=`<div class="month-sec"><div class="month-head">📅 ${month}</div>`;
    weeks.forEach(({w,wi})=>{
      html+=`<div class="exam-wrap"><table class="exam-tbl"><thead><tr><th>שכבה</th>`;
      w.dates.forEach((d,i)=>{
        const p=d?d.split(' * '):['',''];
        html+=`<th style="${i===6?'background:#1a4a2a':''}"><div>${DAY_NAMES[i]}</div><div>${isToday(d)?'🔵 ':''}${p[0]||''}</div><div style="color:var(--acc2);font-size:.6rem">${p[1]||''}</div></th>`;
      });
      html+=`</tr></thead><tbody>`;
      GRADE_LAYERS.forEach(grade=>{
        const evs=(w.grades||{})[grade]||Array(7).fill('');
        let hasMatch=!search;
        if(search) evs.forEach(e=>{if(e&&e.toLowerCase().includes(search))hasMatch=true;});
        const hidden=!activeLayers.has(grade)||!hasMatch;
        html+=`<tr data-grade-row="${grade}"${hidden?' class="hidden"':''}><td class="grd-td">${grade}</td>`;
        evs.forEach((ev,di)=>{
          const c=classify(ev);
          const cls=c==='exam'?'ex-c':c==='hol'?'bg-c':'';
          html+=`<td class="${cls}">${etag(ev)}</td>`;
        });
        html+=`</tr>`;
      });
      html+=`</tbody></table></div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('main').innerHTML = html;
  applyLayers();
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function jumpToYear(idx) {
  // Jump to Rosh Hashana (start) of that year
  const yearLabel = YEAR_LABELS[idx];
  const weekIdx = ALL_SCHED.findIndex(w=>w.year===yearLabel);
  if(weekIdx<0) return;
  showPast = true;
  render();
  setTimeout(()=>{
    const el=document.getElementById(`week-${weekIdx}`);
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  },200);
}

function jumpToMonth(val) {
  if(!val) return;
  const wi = parseInt(val);
  const el = document.getElementById(`week-${wi}`);
  if(el) { el.scrollIntoView({behavior:'smooth',block:'start'}); return; }
  showPast=true; render();
  setTimeout(()=>{
    const el2=document.getElementById(`week-${wi}`);
    if(el2) el2.scrollIntoView({behavior:'smooth',block:'start'});
  },200);
}

function jumpToNow() {
  window._scrolled=false;
  showPast=false;
  render();
}

// Update year highlight in strip based on scroll position
function updateYearHighlight() {
  const ci = findCurrentWeek();
  const visibleWeek = getVisibleWeekIndex();
  const w = ALL_SCHED[visibleWeek];
  const yr = w?.year||'';
  const idx = YEAR_LABELS.indexOf(yr);
  document.querySelectorAll('.yr-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
}

function getVisibleWeekIndex() {
  for(let i=0;i<ALL_SCHED.length;i++) {
    const el=document.getElementById(`week-${i}`);
    if(!el) continue;
    const r=el.getBoundingClientRect();
    if(r.top>=0&&r.top<window.innerHeight*0.6) return i;
  }
  return findCurrentWeek();
}

// Update year pill on scroll
window.addEventListener('scroll',()=>{
  clearTimeout(window._scrollT);
  window._scrollT=setTimeout(updateYearHighlight,80);
},{passive:true});

// Tab switching
function switchTab(tab) {
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  render();
}

// ── SINGLE CLICK: select cell ──
function selectCell(key, e) {
  e.stopPropagation();
  if(selectedCell === key) return; // already selected, ignore (dblclick handles it)
  // Deselect previous
  document.querySelectorAll('.ecell.selected').forEach(el=>el.classList.remove('selected'));
  selectedCell = key;
  // Highlight selected cell
  const items = getCellItems(key, getV(key,''));
  if(!items.length) {
    // Empty cell — single click opens edit directly
    openEdit(key,'','',e);
    return;
  }
  // Find and highlight the cell
  event.currentTarget?.classList.add('selected');
}

// Click outside → deselect

  selectedCell = null;
});

// Delete key → delete selected cell contents
document.addEventListener('keydown', function(e) {
  if(!isEditor || !selectedCell) return;
  if(e.key === 'Delete' || e.key === 'Backspace') {
    // Don't delete if typing in an input
    if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) return;

function updateItemLayers(idx) {
  const card = document.getElementById('ev-card-'+idx);
  if(!card || !editingItems[idx]) return;
  let grades = [...card.querySelectorAll('.item-grade:checked')]
    .map(i=>i.value.replace(/&quot;/g,'"'));
  if(card.querySelector('.item-chatav')?.checked)
    CHATAV.forEach(g=>{if(!grades.includes(g))grades.push(g);});
  if(card.querySelector('.item-tichon')?.checked)
    TICHON.forEach(g=>{if(!grades.includes(g))grades.push(g);});
  editingItems[idx].layers = grades;
}
function refreshItemsList() {
  document.getElementById('em-items-list').innerHTML =

}

function addEventItem() {
  editingItems.push({text:'',layers:[],time:'',loc:'',note:''});

function deleteItem(idx) {
  if(editingItems.length<=1){editingItems[0]={text:'',layers:[],time:'',loc:'',note:''};refreshItemsList();return;}
  editingItems.splice(idx,1);

function getOriginalVal(key) {
  // key = s-{wi}-{cat}-{di}
  const m = key.match(/^s-(\d+)-(.+)-(\d+)$/);
  if(!m) return '';
  const wi=parseInt(m[1]), cat=m[2], di=parseInt(m[3]);
  return (ALL_SCHED[wi]?.categories?.[cat]||[])[di]||'';
}

function openEdit(key, val, ctx, e) {
  if(e) e.stopPropagation();
  if(!isEditor) return;
  pendingEdit=key;
  document.getElementById('em-title').textContent=`✏️ ${ctx}`;
  // Load existing items — always use original ALL_SCHED val for legacy
  editingItems = getCellItems(key, getOriginalVal(key));
  if(!editingItems.length) editingItems=[{text:'',layers:[],time:'',loc:'',note:''}];
  // Deep copy to avoid mutation
  editingItems = editingItems.map(i=>({...i, layers:[...(i.layers||[])]}));
  refreshItemsList();
  document.getElementById('event-modal').classList.add('open');
  setTimeout(()=>document.getElementById('em-items-list').querySelector('textarea')?.focus(),100);
}

function saveEvent() {
  if(!pendingEdit) return;
  const key = pendingEdit;
  // Collect latest values from DOM inputs
  document.querySelectorAll('#em-items-list .ev-item-card').forEach((card,idx)=>{
    if(!editingItems[idx]) return;
    editingItems[idx].text = card.querySelector('textarea')?.value||'';
    editingItems[idx].time = card.querySelectorAll('input[type="text"],input:not([type])')[0]?.value||'';
    editingItems[idx].loc  = card.querySelectorAll('input[type="text"],input:not([type])')[1]?.value||'';
    editingItems[idx].note = card.querySelectorAll('input[type="text"],input:not([type])')[2]?.value||'';
    // Collect grades
    let grades = [...card.querySelectorAll('.item-grade:checked')].map(i=>i.value.replace(/&quot;/g,'"'));
    if(card.querySelector('.item-chatav')?.checked) CHATAV.forEach(g=>{if(!grades.includes(g))grades.push(g);});
    if(card.querySelector('.item-tichon')?.checked) TICHON.forEach(g=>{if(!grades.includes(g))grades.push(g);});
    editingItems[idx].layers = grades;
  });
  // Filter empty items
  const items = editingItems.filter(i=>i.text&&i.text.trim());
  saveHistory();
  setCellItems(key, items);
  closeModal('event-modal');
  persist();
  showStatus('💾 נשמר');
  render();
}

// ═══════════════════════════════════════════
// DRAG & DROP
// ═══════════════════════════════════════════
function dragStart(e,key) {
  // Full cell drag
  dragKey = {type:'cell', key};
  e.dataTransfer.effectAllowed='move';
  e.stopPropagation();
  clearSelection();
}

function dragItemStart(e,key,itemIdx) {
  // Single item drag
  dragKey = {type:'item', key, itemIdx};
  e.dataTransfer.effectAllowed='move';
  e.stopPropagation();
  clearSelection();
}

function dropOnItem(e,targetKey,targetItemIdx) {
  e.preventDefault();
  e.stopPropagation();
  e.target.closest('[draggable]').style.outline='';
  if(!dragKey) return;

  if(dragKey.type==='item') {
    const srcKey = dragKey.key;
    const srcIdx = dragKey.itemIdx;
    if(srcKey===targetKey && srcIdx===targetItemIdx) { dragKey=null; return; }

    saveHistory();
    const srcItems = getCellItems(srcKey, getOriginalVal(srcKey));
    const [movedItem] = srcItems.splice(srcIdx, 1);

    if(srcKey===targetKey) {
      // Same cell — reorder
      srcItems.splice(targetItemIdx, 0, movedItem);
      setCellItems(srcKey, srcItems);
    } else {
      // Different cell — move item
      setCellItems(srcKey, srcItems);
      const tgtItems = getCellItems(targetKey, getOriginalVal(targetKey));
      tgtItems.splice(targetItemIdx, 0, movedItem);
      setCellItems(targetKey, tgtItems);
    }
    dragKey=null;
    persist(); render();
    showStatus('🔀 הועבר');
  } else {
    // Full cell drop on item → add to target
    doDrop(e, targetKey);
  }
}
function doDrop(e,targetKey) {
  e.preventDefault();
  e.target.closest('.ecell')?.classList.remove('drag-over');
  if(!dragKey) return;

  const dk = dragKey;
  dragKey = null;

  if(dk.type==='item') {
    // Single item dropped on cell background
    saveHistory();
    const srcItems = getCellItems(dk.key, getOriginalVal(dk.key));
    const [movedItem] = srcItems.splice(dk.itemIdx, 1);
    setCellItems(dk.key, srcItems);
    const tgtItems = getCellItems(targetKey, getOriginalVal(targetKey));
    tgtItems.push(movedItem);
    setCellItems(targetKey, tgtItems);
    persist(); render();
    showStatus('🔀 הועבר');
    return;
  }

  // Full cell drag
  const srcKey = dk.key;
  if(srcKey===targetKey) return;
  saveHistory();
  const srcItems = getCellItems(srcKey, getOriginalVal(srcKey));
  const tgtItems = getCellItems(targetKey, getOriginalVal(targetKey));
  setCellItems(targetKey, [...tgtItems, ...srcItems]);
  setCellItems(srcKey, []);
  persist(); render();
  showStatus('🔀 הועבר');
}

    }

function selectAllMonths(){document.querySelectorAll('.mcb').forEach(c=>c.checked=true);}
function clearAllMonths(){document.querySelectorAll('.mcb').forEach(c=>c.checked=false);}

function doExport() {
  const skipEmpty = document.getElementById('ex-skip-empty').checked;
  const skipPast  = document.getElementById('ex-skip-past').checked;
  const ci = findCurrentWeek();
  const selMonths = new Set();
  document.querySelectorAll('.mcb:checked').forEach(cb => {
    const wi = parseInt(cb.value);
    if(ALL_SCHED[wi]) selMonths.add(ALL_SCHED[wi].month);
  });
  if(!selMonths.size){showStatus('⚠️ לא נבחרו חודשים');return;}
  let csv = '\uFEFF';
  csv += 'שנה,חודש,שבוע,יום,עברי,לועזי,' + CAT_ORDER.join(',') + '\n';
  let rowCount = 0;
  ALL_SCHED.forEach((week,wi) => {
    if(!selMonths.has(week.month)) return;
    if(skipPast && wi<ci) return;
    week.dates.forEach((d,di) => {
      const p = d?d.split(' * '):['',''];
      const vals = {};
      CAT_ORDER.forEach(cat => {
        vals[cat] = getV('s-'+wi+'-'+cat+'-'+di, (week.categories[cat]||[])[di]||'');
      });
      if(skipEmpty && Object.values(vals).every(v=>!v||!v.trim())) return;
      const row = [week.year||'',week.month||'',
        (week.dates[0]||'').split(' * ')[0]+' - '+(week.dates[6]||'').split(' * ')[0],
        DAY_NAMES[di],p[0]||'',p[1]||''];
      CAT_ORDER.forEach(cat=>row.push('"'+(vals[cat]||'').replace(/"/g,'""')+'"'));
      csv+=row.join(',')+'\n';
      rowCount++;
    });
  });
  closeModal('export-modal');
  if(!rowCount){showStatus('⚠️ אין נתונים לייצוא');return;}
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='לוח_שנה.csv';a.click();
  URL.revokeObjectURL(url);
  showStatus('📥 יוצאו '+rowCount+' שורות');
}

function buildWeekText() {
  const SD = getActiveSchedule ? getActiveSchedule() : ALL_SCHED;
  const ci = findCurrentWeek();
  const heroWi = Math.max(0, Math.min(SD.length-1, ci + (heroWeekOffset||0)));
  const cw = SD[heroWi];

  const dateRange = (cw.dates[0]||'').split(' * ')[0] + ' – ' + (cw.dates[6]||'').split(' * ')[0];
  const secRange = (cw.dates[0]||'').split(' * ')[1] + ' – ' + (cw.dates[6]||'').split(' * ')[1];
  const parshaEv2 = (cw.categories['פדגוגי']||[]).find(v=>v&&v.includes('פרשת'))||
                    (cw.categories['מעגל השנה']||[]).find(v=>v&&v.includes('פרשת'))||'';

  let lines = [];
  lines.push('📅 עדכון שבועי' + (parshaEv2 ? ' | ' + parshaEv2 : ''));
  lines.push(dateRange + ' | ' + secRange);
  lines.push('');

  // Build per-day events
  DAY_NAMES.forEach((dayName, i) => {
    const d = cw.dates[i];
    if(!d) return;
    const p = d.split(' * ');
    const dayEvtsList = [];
    CAT_ORDER.forEach(cat => {
      const key = 's-' + heroWi + '-' + cat + '-' + i;
      const cellItems = getCellItems(key, getOriginalVal(key));
      cellItems.forEach(item => {
        if(!item.text||!item.text.trim()||item.text.includes('פרשת')) return;
        if(item.text.includes('חופשת')) return;
        let line = '• ' + item.text;
        if(item.time) line += ' (' + item.time + ')';
        if(item.loc) line += ' | ' + item.loc;
        if(item.note) line += ' — ' + item.note;
        dayEvtsList.push(line);
      });
    });
    if(dayEvtsList.length) {
      lines.push('🗓 ' + dayName + ' ' + p[0] + ' (' + (p[1]||'') + ')');
      dayEvtsList.forEach(l => lines.push(l));
      lines.push('');
    }
  });

  lines.push('——');
  lines.push('ישיבת בני עקיבא עלי');
  return lines.join('\n');
}

function sendEmail() {
  const text = buildWeekText();
  const subject = encodeURIComponent(text.split('\n')[0]);
  const body = encodeURIComponent(text);
  window.open('mailto:?subject=' + subject + '&body=' + body);
}

  const text = buildWeekText();
  const encoded = encodeURIComponent(text);
  window.open('https://wa.me/?text=' + encoded);
}

// Event delegation for edit cells
let _lastClickKey = null;
let _lastClickTime = 0;

document.addEventListener('click', function(e) {
  if(!isEditor) return;

  // Ignore clicks on buttons inside cells
  if(e.target.tagName === 'BUTTON') return;

  const cell = e.target.closest('.ecell.editable');
  if(!cell) {
    clearSelection();
    return;
  }
  e.stopPropagation();
  const key = cell.dataset.key;
  const cat = cell.dataset.cat;
  if(!key) return;

  const now = Date.now();
  const isDoubleClick = (key === _lastClickKey) && (now - _lastClickTime < 500);
  _lastClickKey = key;
  _lastClickTime = now;

  if(isDoubleClick) {
    // Double click → open edit
    clearSelection();
    openEdit(key, getOriginalVal(key), cat);
  } else {
    // Single click → select
    clearSelection();
    selectedCell = key;
    cell.classList.add('selected');
    const tb = document.getElementById('edit-toolbar');
    if(tb) tb.classList.add('show');
  }
});

      <button class="lctrl" style="font-size:.75rem" onclick="clearAllMonths()">נקה הכל</button>
    </div>
    <div id="export-months" style="display:flex;flex-direction:column;gap:4px;max-height:220px;overflow-y:auto;border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;margin-bottom:14px;"></div>

    <div class="fl" style="margin-bottom:8px">אפשרויות</div>
    <div style="display:flex;flex-direction:column;gap:7px;margin-bottom:16px">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.84rem;font-weight:500">
        <input type="checkbox" id="ex-skip-empty" checked>
        <span>הסתר שורות ריקות לחלוטין</span>
      </label>
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.84rem;font-weight:500">
        <input type="checkbox" id="ex-skip-past">
        <span>הסתר שבועות שעברו</span>
      </label>
    </div>

    <div class="mact">
      <button class="btn" style="background:#eee;color:#333" onclick="closeModal('export-modal')">ביטול</button>
      <button class="btn btn-excel" onclick="doExport()">⬇️ ייצא</button>
    </div>
  </div>
</div>

</body>
</html>
