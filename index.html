<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח שנה תשפ"ו</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f1eb; --surface: #fff; --border: #ddd8cc; --text: #1c1812; --muted: #7a7269;
  --accent: #2c5f2e; --accent2: #c47b1a; --header: #1c1812;
  --radius: 10px; --sh: 0 2px 12px rgba(0,0,0,0.07); --sh-lg: 0 8px 32px rgba(0,0,0,0.14);
  --c-chag:#7a3a00; --c-pad:#1a3a6b; --c-hev:#2c5f2e; --c-pni:#7a2030; --c-ris:#4a4a6a; --c-ach:#5a4520; --c-bag:#5a1a7a;
  --g-z:#b55a00; --g-h:#006080; --g-t:#5a006b; --g-y:#006b3a; --g-ya:#8b0000; --g-yb:#00468b;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Heebo',sans-serif; background:var(--bg); color:var(--text); direction:rtl; min-height:100vh; }

.header { background:var(--header); color:#fff; height:60px; padding:0 22px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:200; box-shadow:0 2px 20px rgba(0,0,0,0.3); }
.logo { font-size:1.05rem; font-weight:800; } .logo em { color:var(--accent2); font-style:normal; }
.header-right { display:flex; align-items:center; gap:7px; }
.today-badge { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:20px; padding:3px 11px; font-size:0.73rem; color:rgba(255,255,255,0.75); }

.btn { padding:5px 13px; border:none; border-radius:6px; cursor:pointer; font-family:'Heebo',sans-serif; font-size:0.8rem; font-weight:600; transition:all 0.15s; white-space:nowrap; }
.btn-ghost { background:transparent; border:1.5px solid rgba(255,255,255,0.25); color:rgba(255,255,255,0.8); }
.btn-ghost:hover { background:rgba(255,255,255,0.1); }
.btn-gold { background:var(--accent2); color:#fff; } .btn-gold:hover { background:#b36e15; }
.btn-red { background:#b52828; color:#fff; }
.btn-green { background:var(--accent); color:#fff; }
.btn-excel { background:#1d6f42; color:#fff; } .btn-excel:hover { background:#155230; }

.tabs-bar { background:var(--surface); border-bottom:2px solid var(--border); padding:0 22px; display:flex; align-items:center; position:sticky; top:60px; z-index:150; }
.tab-btn { padding:12px 18px; border:none; background:transparent; font-family:'Heebo',sans-serif; font-size:0.86rem; font-weight:600; color:var(--muted); cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; transition:all 0.15s; }
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
.tabs-spacer { flex:1; }

.layers-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:8px 22px; display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.layers-label { font-size:0.72rem; font-weight:700; color:var(--muted); }
.layer-chip { padding:4px 11px; border-radius:20px; border:2px solid; font-size:0.72rem; font-weight:700; cursor:pointer; transition:all 0.15s; user-select:none; opacity:0.38; }
.layer-chip.on { opacity:1; }
.layer-chip[data-layer="מעגל השנה"]  { border-color:var(--c-chag); color:var(--c-chag); } .layer-chip[data-layer="מעגל השנה"].on  { background:var(--c-chag);  color:#fff; }
.layer-chip[data-layer="פדגוגי"]     { border-color:var(--c-pad);  color:var(--c-pad);  } .layer-chip[data-layer="פדגוגי"].on     { background:var(--c-pad);   color:#fff; }
.layer-chip[data-layer="חברתי"]      { border-color:var(--c-hev);  color:var(--c-hev);  } .layer-chip[data-layer="חברתי"].on      { background:var(--c-hev);   color:#fff; }
.layer-chip[data-layer="פנימיה"]     { border-color:var(--c-pni);  color:var(--c-pni);  } .layer-chip[data-layer="פנימיה"].on     { background:var(--c-pni);   color:#fff; }
.layer-chip[data-layer="רישום"]      { border-color:var(--c-ris);  color:var(--c-ris);  } .layer-chip[data-layer="רישום"].on      { background:var(--c-ris);   color:#fff; }
.layer-chip[data-layer="אחר"]        { border-color:var(--c-ach);  color:var(--c-ach);  } .layer-chip[data-layer="אחר"].on        { background:var(--c-ach);   color:#fff; }
.layer-chip[data-layer="בגרויות ומתכונות"] { border-color:var(--c-bag);  color:var(--c-bag);  } .layer-chip[data-layer="בגרויות ומתכונות"].on  { background:var(--c-bag);   color:#fff; }
.layer-chip[data-layer="שכבת ז"]    { border-color:var(--g-z);   color:var(--g-z);   } .layer-chip[data-layer="שכבת ז"].on    { background:var(--g-z);    color:#fff; }
.layer-chip[data-layer="שכבת ח"]    { border-color:var(--g-h);   color:var(--g-h);   } .layer-chip[data-layer="שכבת ח"].on    { background:var(--g-h);    color:#fff; }
.layer-chip[data-layer="שכבת ט"]    { border-color:var(--g-t);   color:var(--g-t);   } .layer-chip[data-layer="שכבת ט"].on    { background:var(--g-t);    color:#fff; }
.layer-chip[data-layer="שכבת י"]    { border-color:var(--g-y);   color:var(--g-y);   } .layer-chip[data-layer="שכבת י"].on    { background:var(--g-y);    color:#fff; }
.layer-chip[data-layer='שכבת י"א']  { border-color:var(--g-ya);  color:var(--g-ya);  } .layer-chip[data-layer='שכבת י"א'].on  { background:var(--g-ya);   color:#fff; }
.layer-chip[data-layer='שכבת י"ב']  { border-color:var(--g-yb);  color:var(--g-yb);  } .layer-chip[data-layer='שכבת י"ב'].on  { background:var(--g-yb);   color:#fff; }
.layer-divider { width:1px; height:20px; background:var(--border); margin:0 3px; }
.layer-ctrl { padding:3px 9px; border-radius:20px; font-size:0.68rem; font-weight:700; cursor:pointer; border:1.5px solid var(--border); background:var(--bg); color:var(--muted); transition:all 0.15s; }
.layer-ctrl:hover { border-color:var(--text); color:var(--text); }

.search-bar { background:var(--bg); padding:8px 22px; display:flex; align-items:center; gap:9px; border-bottom:1px solid var(--border); }
.search-wrap { position:relative; flex:1; max-width:300px; }
.search-wrap input { width:100%; padding:6px 30px 6px 9px; border:1.5px solid var(--border); border-radius:8px; font-family:'Heebo',sans-serif; font-size:0.84rem; background:var(--surface); outline:none; direction:rtl; text-align:right; }
.search-wrap input:focus { border-color:var(--accent); }
.search-ico { position:absolute; left:8px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:0.88rem; }
.month-sel { padding:6px 8px; border:1.5px solid var(--border); border-radius:8px; font-family:'Heebo',sans-serif; font-size:0.81rem; background:var(--surface); outline:none; cursor:pointer; }
.jump-today { font-size:0.78rem; font-weight:600; color:var(--accent); cursor:pointer; text-decoration:underline; background:none; border:none; font-family:'Heebo',sans-serif; }

.main { padding:16px 22px; max-width:1480px; margin:0 auto; }

.hero { background:linear-gradient(135deg,#1c1812 55%,#2c5f2e); border-radius:14px; padding:16px 20px; margin-bottom:22px; color:#fff; display:flex; align-items:center; gap:16px; box-shadow:var(--sh-lg); }
.hero-badge { background:var(--accent2); border-radius:10px; padding:6px 14px; font-size:0.7rem; font-weight:800; white-space:nowrap; }
.hero-dates { font-size:0.92rem; font-weight:700; margin-top:7px; }
.hero-sub { font-size:0.74rem; color:rgba(255,255,255,0.5); margin-top:2px; }
.hero-events { flex:1; display:flex; gap:6px; flex-wrap:wrap; }
.hero-event { background:rgba(255,255,255,0.12); border-radius:6px; padding:3px 9px; font-size:0.73rem; }

.month-sec { margin-bottom:30px; }
.month-head { font-size:0.98rem; font-weight:800; color:var(--accent); padding:6px 0 8px; border-bottom:2px solid var(--accent); margin-bottom:11px; }

.week-block { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:9px; box-shadow:var(--sh); scroll-margin-top:160px; }
.week-block.current-week { border:2.5px solid var(--accent2); box-shadow:0 0 0 4px rgba(196,123,26,0.1),var(--sh-lg); }

.week-head { display:grid; grid-template-columns:96px repeat(7,1fr); background:var(--header); }
.wh-label { display:flex; align-items:center; justify-content:center; font-size:0.58rem; color:rgba(255,255,255,0.32); font-weight:600; padding:8px 3px; border-left:1px solid rgba(255,255,255,0.06); }
.wh-day { padding:7px 4px; text-align:center; border-right:1px solid rgba(255,255,255,0.06); }
.wh-day.shabbat .wh-heb { color:#a8e6b0; }
.wh-name { font-size:0.56rem; color:rgba(255,255,255,0.35); }
.wh-heb  { font-size:0.71rem; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.wh-sec  { font-size:0.6rem; color:var(--accent2); font-weight:500; }
.today-dot { display:inline-block; width:5px; height:5px; background:var(--accent2); border-radius:50%; margin-left:2px; vertical-align:middle; }

.cat-row { display:grid; grid-template-columns:96px repeat(7,1fr); border-top:1px solid var(--border); }
.cat-row.layer-hidden { display:none; }
.cat-lbl { display:flex; align-items:center; justify-content:center; padding:5px 3px; font-size:0.65rem; font-weight:800; color:#fff; text-align:center; border-left:1px solid rgba(255,255,255,0.15); }
.cat-lbl.chag { background:var(--c-chag); }
.cat-lbl.pad  { background:var(--c-pad);  }
.cat-lbl.hev  { background:var(--c-hev);  }
.cat-lbl.pni  { background:var(--c-pni);  }
.cat-lbl.ris  { background:var(--c-ris);  }
.cat-lbl.ach  { background:var(--c-ach);  }

.event-cell { padding:5px 5px; min-height:38px; border-right:1px solid var(--border); font-size:0.72rem; line-height:1.4; }
.event-cell:last-child { border-right:none; }
.event-cell.holiday-cell { background:#fff5f5; }
.event-cell.shabbat-cell { background:#f2fbf3; }
.event-cell.editable { cursor:pointer; }
.event-cell.editable:hover { background:#fffbf0!important; outline:2px dashed var(--accent2); outline-offset:-2px; }

.etag { display:inline-block; border-radius:4px; padding:2px 5px; font-size:0.68rem; font-weight:500; margin:1px; line-height:1.4; }
.etag.general { background:#edf3ff; color:#1a3a6b; }
.etag.holiday  { background:#fdecea; color:#7a1a1a; }
.etag.shabbat  { background:#e8f5e9; color:#1a4a1a; }
.etag.exam     { background:#f3e5f5; color:#5a1a6b; }

.grade-badges { display:flex; flex-wrap:wrap; gap:2px; margin-top:3px; }
.gbadge { display:inline-block; border-radius:3px; padding:1px 5px; font-size:0.6rem; font-weight:700; color:#fff; }
.gbadge.gz { background:var(--g-z); } .gbadge.gh { background:var(--g-h); }
.gbadge.gt { background:var(--g-t); } .gbadge.gy { background:var(--g-y); }
.gbadge.gya { background:var(--g-ya); } .gbadge.gyb { background:var(--g-yb); }

.exam-wrap { overflow-x:auto; margin-bottom:9px; }
.exam-tbl { width:100%; border-collapse:collapse; font-size:0.72rem; min-width:600px; box-shadow:var(--sh); }
.exam-tbl th { background:var(--header); color:#fff; padding:7px; text-align:center; font-weight:600; font-size:0.68rem; border-right:1px solid rgba(255,255,255,0.08); white-space:nowrap; }
.exam-tbl td { padding:6px; border:1px solid var(--border); text-align:center; vertical-align:top; min-width:66px; }
.exam-tbl td.grade-td { background:#1a0a30; color:#fff; font-weight:700; font-size:0.68rem; }
.exam-tbl td.exam-cell { background:#faf0ff; } .exam-tbl td.bagrut-cell { background:#fff0e8; }
.exam-tbl tr[data-grade-row].layer-hidden { display:none; }

.modal-ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:500; align-items:center; justify-content:center; }
.modal-ov.open { display:flex; }
.modal { background:var(--surface); border-radius:14px; padding:24px 28px; width:390px; max-width:95vw; box-shadow:var(--sh-lg); }
.modal h3 { font-size:1rem; font-weight:800; margin-bottom:14px; }
.fl { font-size:0.76rem; font-weight:700; color:var(--muted); margin-bottom:4px; }
.fi { width:100%; padding:8px 10px; border:1.5px solid var(--border); border-radius:8px; font-family:'Heebo',sans-serif; font-size:0.86rem; outline:none; direction:rtl; text-align:right; margin-bottom:11px; }
.fi:focus { border-color:var(--accent); }
.layers-grid { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:13px; }
.lcheck { display:flex; align-items:center; gap:4px; cursor:pointer; }
.lcheck input { cursor:pointer; }
.modal-actions { display:flex; gap:8px; }
.modal-actions .btn { flex:1; }
.login-modal { width:310px; text-align:center; }
.login-modal p { color:var(--muted); font-size:0.81rem; margin-bottom:16px; }
#pw-err { color:#b52828; font-size:0.78rem; margin-top:6px; display:none; }

.status-bar { position:fixed; bottom:0; left:0; right:0; background:var(--header); color:rgba(255,255,255,0.75); padding:6px 22px; font-size:0.74rem; display:flex; align-items:center; gap:12px; z-index:100; transform:translateY(100%); transition:transform 0.3s; }
.status-bar.show { transform:translateY(0); }
.status-close { cursor:pointer; color:var(--accent2); font-weight:700; }
.edit-badge { background:#fef3cd; border:1.5px solid #f0c030; color:#7a5a00; border-radius:6px; padding:2px 8px; font-size:0.7rem; font-weight:700; }

@media (max-width:768px) {
  .header,.tabs-bar,.layers-bar,.search-bar,.main { padding-right:11px; padding-left:11px; }
  .week-head,.cat-row { grid-template-columns:58px repeat(7,1fr); }
  .cat-lbl { font-size:0.52rem; padding:3px 1px; }
  .hero { flex-direction:column; align-items:flex-start; }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">לוח שנה <em>תשפ"ו</em></div>
  <div class="header-right">
    <span class="today-badge" id="today-badge"></span>
    <span class="edit-badge" id="edit-badge" style="display:none">✏️ עריכה</span>
    <button class="btn btn-excel" onclick="exportExcel()">⬇️ Excel</button>
    <button class="btn btn-ghost" id="login-btn" onclick="openLogin()">כניסת עורך</button>
    <button class="btn btn-red" id="logout-btn" style="display:none" onclick="doLogout()">יציאה</button>
    <button class="btn btn-gold" id="save-btn" style="display:none" onclick="saveEdits()">💾 שמור</button>
  </div>
</header>

<div class="tabs-bar">
  <button class="tab-btn active" id="tab-loz" onclick="switchTab('loz')">📅 לו"ז כללי</button>
  <button class="tab-btn" id="tab-exams" onclick="switchTab('exams')">📝 מבחנים</button>
  <div class="tabs-spacer"></div>
</div>

<div class="layers-bar" id="layers-bar"></div>

<div class="search-bar">
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="חיפוש..." oninput="render()">
    <span class="search-ico">🔍</span>
  </div>
  <select class="month-sel" id="month-select" onchange="jumpToMonth(this.value)">
    <option value="">עבור לחודש...</option>
  </select>
  <button class="jump-today" onclick="jumpToToday()">↩ השבוע הנוכחי</button>
</div>

<main class="main" id="main"></main>

<div class="status-bar" id="status-bar">
  <span id="status-msg" style="flex:1"></span>
  <span class="status-close" onclick="hideStatus()">✕</span>
</div>

<div class="modal-ov" id="login-modal">
  <div class="modal login-modal">
    <h3>🔐 כניסת עורכים</h3>
    <p>הזן את סיסמת העריכה</p>
    <input class="fi" type="password" id="pw-in" placeholder="סיסמה" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="modal-actions">
      <button class="btn btn-ghost" style="border-color:#ccc;color:#333" onclick="closeModal('login-modal')">ביטול</button>
      <button class="btn btn-gold" onclick="doLogin()">כניסה</button>
    </div>
    <div id="pw-err">❌ סיסמה שגויה</div>
  </div>
</div>

<div class="modal-ov" id="event-modal">
  <div class="modal">
    <h3 id="em-title">✏️ עריכת אירוע</h3>
    <div class="fl">תוכן האירוע</div>
    <textarea class="fi" id="em-text" rows="3" placeholder="הכנס טקסט..."></textarea>
    <div class="fl">לאיזה שכבות האירוע רלוונטי? <small style="color:var(--muted);font-weight:400">(לא מסומן = רלוונטי לכולם)</small></div>
    <div class="layers-grid" id="em-layers"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" style="border-color:#ccc;color:#333" onclick="closeModal('event-modal')">ביטול</button>
      <button class="btn btn-green" onclick="saveEvent()">שמור</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxyV0xQH_PnMsEp2H6_QIuIG1LU57Xait_U2xWHnj7Dc8HbahDvmCSIoW32WioG0m1c/exec';
const EDIT_PASSWORD = 'editor2025';

const CAT_ORDER = ['מעגל השנה','פדגוגי','חברתי','רישום','פנימיה','אחר','בגרויות ומתכונות'];
const GRADE_LAYERS = ['שכבת ז','שכבת ח','שכבת ט','שכבת י','שכבת י"א','שכבת י"ב'];
const CAT_CSS = {'מעגל השנה':'chag','פדגוגי':'pad','חברתי':'hev','פנימיה':'pni','רישום':'ris','אחר':'ach','בגרויות ומתכונות':'bag'};
const GRADE_CSS = {'שכבת ז':'gz','שכבת ח':'gh','שכבת ט':'gt','שכבת י':'gy','שכבת י"א':'gya','שכבת י"ב':'gyb'};

function parseDate(s){if(!s)return null;const m=s.match(/(\d{2})\.(\d{2})/);if(!m)return null;const mo=parseInt(m[2]),d=parseInt(m[1]);return new Date(mo<=7?2026:2025,mo-1,d);}
function isToday(s){const d=parseDate(s);if(!d)return false;const t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}
function findCW(data){const t=new Date();const sun=new Date(t.getFullYear(),t.getMonth(),t.getDate()-t.getDay());let b=0,bd=Infinity;data.forEach((w,i)=>{const d=parseDate(w.dates[0]);if(!d)return;const df=Math.abs(d-sun);if(df<bd){bd=df;b=i;}});return b;}

  CAT_ORDER.forEach(l=>{ h+=`<span class="layer-chip on" data-layer="${l}" onclick="toggleLayer(this,'${l.replace(/'/g,"\\'")}')">${l}</span>`; });
  h+='<div class="layer-divider"></div>';h+=`<span class="layer-chip on" data-layer="בגרויות ומתכונות" onclick="toggleLayer(this,'בגרויות ומתכונות')">🎓 בגרויות</span>`;h+='<div class="layer-divider"></div><span class="layers-label">שכבות:</span>';
  GRADE_LAYERS.forEach(l=>{ h+=`<span class="layer-chip on" data-layer="${l}" onclick="toggleLayer(this,'${l.replace(/"/g,"&quot;").replace(/'/g,"\\'")}' )">${l}</span>`; });
  h+='<div class="layer-divider"></div><button class="layer-ctrl" onclick="allLayers()">הכל</button><button class="layer-ctrl" onclick="clearLayers()">נקה</button>';
  document.getElementById('layers-bar').innerHTML=h;
}
function buildMonthSel(){
  const months=[...new Set(SCHEDULE_DATA.map(w=>w.month).filter(Boolean))];
  document.getElementById('month-select').innerHTML='<option value="">עבור לחודש...</option>'+months.map((m,i)=>`<option value="${i}">${m}</option>`).join('');
}
function toggleLayer(el,layer){
  if(activeLayers.has(layer))activeLayers.delete(layer);else activeLayers.add(layer);
  el.classList.toggle('on',activeLayers.has(layer));
  applyLayers();
}
function allLayers(){[...CAT_ORDER,...GRADE_LAYERS,'בגרויות ומתכונות'].forEach(l=>activeLayers.add(l));document.querySelectorAll('.layer-chip').forEach(c=>c.classList.add('on'));applyLayers();}
function clearLayers(){activeLayers.clear();document.querySelectorAll('.layer-chip').forEach(c=>c.classList.remove('on'));applyLayers();}
function applyLayers(){
  document.querySelectorAll('.cat-row[data-cat]').forEach(r=>r.classList.toggle('layer-hidden',!activeLayers.has(r.dataset.cat)));
  document.querySelectorAll('[data-grade-row]').forEach(r=>r.classList.toggle('layer-hidden',!activeLayers.has(r.dataset.gradeRow)));
  document.querySelectorAll('.gbadge[data-grade]').forEach(b=>{ b.style.display=activeLayers.has(b.dataset.grade)?'':'none'; });
}

// ═══ CLASSIFY ═══
function cls(t){if(!t||!t.trim())return'';if(t.includes('בגרות')||t.includes('מתכונת'))return'exam';if(t.includes('מבחן')||t.includes('מבדק'))return'exam';if(t.includes('חופשת')||t.includes('פסח')||t.includes('סוכות')||t.includes('חנוכה')||t.includes('פורים')||t.includes('ראש השנה')||t.includes('יום כיפור')||t.includes('שבועות')||t.includes('שמיני')||t.includes('הושענא')||t.includes('תשעה')||t.includes('צום')||t.includes('תענית'))return'holiday';if(t.includes('פרשת')||t.includes('שבת'))return'shabbat';return'general';}
function tag(t){if(!t||!t.trim())return'';return`<span class="etag ${cls(t)}">${t.trim()}</span>`;}
function badges(layers){
  if(!layers||!layers.length)return'';
  return'<div class="grade-badges">'+layers.map(g=>{
    const c=GRADE_CSS[g]||'';const l=GRADE_LBL[g]||g;
    const vis=activeLayers.has(g)?'':'display:none';
    return`<span class="gbadge ${c}" data-grade="${g}" style="${vis}">${l}</span>`;
  }).join('')+'</div>';
}

// ═══ GET/SET ═══
function getV(key,fb){return edits.hasOwnProperty(key)?edits[key]:(fb||'');}
function getLayers(key){const v=edits['layers_'+key];return v?v.split(',').filter(Boolean):[];}

// ═══ BAGRUT HELPER ═══
// Build a map: secular date string -> {ya: text, yb: text}
function buildBagrutMap() {
  const map = {};
  BAGRUT_DATA.forEach((week,wi) => {
    week.dates.forEach((d,di) => {
      if (!d) return;
      const secular = (d.split(' * ')[1]||'').trim();
      if (!secular) return;
      ['שכבת י"א','שכבת י"ב'].forEach(grade => {
        const evs = (week.grades||{})[grade]||[];
        const ev = evs[di]||'';
        const key = `bg-${wi}-${grade}-${di}`;
        const val = getV(key, ev);
        if (val && val.trim()) {
          if (!map[secular]) map[secular] = {};
          if (!map[secular][grade]) map[secular][grade] = [];
          map[secular][grade].push({text:val.trim(), key});
        }
      });
    });
  });
  return map;
}

// ═══ RENDER ═══
function render(){
  const s=document.getElementById('search-input').value.toLowerCase().trim();
  if(currentTab==='loz')renderSched(s);
  else renderExam(EXAMS_DATA,s,'ex');
}

function renderSched(search){
  const ci=findCW(SCHEDULE_DATA); const cw=SCHEDULE_DATA[ci];
  const hev=[];
  CAT_ORDER.forEach(cat=>{(cw.categories[cat]||[]).forEach(ev=>{if(ev&&ev.trim())hev.push(ev.trim());});});
  let html=`<div class="hero"><div><div class="hero-badge">📍 השבוע</div><div class="hero-dates">${(cw.dates[0]||'').split(' * ')[0]} – ${(cw.dates[6]||'').split(' * ')[0]}</div><div class="hero-sub">${cw.month||''}</div></div><div class="hero-events">${hev.slice(0,6).map(e=>`<span class="hero-event">${e}</span>`).join('')}</div></div>`;
  const months={};
  SCHEDULE_DATA.forEach((w,wi)=>{const m=w.month||'כללי';if(!months[m])months[m]=[];months[m].push({w,wi});});
  Object.entries(months).forEach(([month,weeks])=>{
    let mc='';
    weeks.forEach(({w,wi})=>{
      if(search){let f=false;CAT_ORDER.forEach(cat=>{(w.categories[cat]||[]).forEach((ev,di)=>{if(getV(`s-${wi}-${cat}-${di}`,ev).toLowerCase().includes(search))f=true;});});if(!f)return;}
      const isCur=wi===ci;
      mc+=`<div class="week-block${isCur?' current-week':''}" id="week-${wi}"><div class="week-head"><div class="wh-label">שבוע</div>`;
      w.dates.forEach((d,i)=>{const p=d?d.split(' * '):['',''];mc+=`<div class="wh-day${i===6?' shabbat':''}"><div class="wh-name">${DAY_NAMES[i]}</div><div class="wh-heb">${isToday(d)?'<span class="today-dot"></span>':''}${p[0]||''}</div><div class="wh-sec">${p[1]||''}</div></div>`;});
      mc+=`</div>`;
      const bagMap = buildBagrutMap();
      CAT_ORDER.forEach(cat=>{
        // Special handling for בגרויות ומתכונות — pull from BAGRUT_DATA by date
        if (cat === 'בגרויות ומתכונות') {
          const hidden = !activeLayers.has(cat);
          mc+=`<div class="cat-row${hidden?' layer-hidden':''}" data-cat="${cat}"><div class="cat-lbl bag">${cat}</div>`;
          w.dates.forEach((d,di)=>{
            const secular = (d?d.split(' * ')[1]||'':'').trim();
            const bagEvents = bagMap[secular]||{};
            let cellContent = '';
            ['שכבת י"א','שכבת י"ב'].forEach(grade=>{
              (bagEvents[grade]||[]).forEach(({text,key})=>{
                const gCss = GRADE_CSS[grade]||'';
                const gLbl = GRADE_LBL[grade]||grade;
                cellContent += `<div style="margin-bottom:2px">${tag(text)}<span class="gbadge ${gCss}" style="font-size:0.58rem;padding:1px 4px;margin-right:2px">${gLbl}</span></div>`;
              });
            });
            const editorPlus = isEditor&&!cellContent?'<span style="color:#ddd;font-size:0.66rem">+</span>':'';
            mc+=`<div class="event-cell${cls(cellContent)==='exam'?' exam-cell':''}">${cellContent}${editorPlus}</div>`;
          });
          mc+=`</div>`;
          return;
        }
        const evs=w.categories[cat]||Array(7).fill('');
        mc+=`<div class="cat-row${activeLayers.has(cat)?'':' layer-hidden'}" data-cat="${cat}"><div class="cat-lbl ${CAT_CSS[cat]||'ach'}">${cat}</div>`;
        evs.forEach((ev,di)=>{
          const key=`s-${wi}-${cat}-${di}`;const val=getV(key,ev);const layers=getLayers(key);
          const cc=`event-cell${cls(val)==='holiday'?' holiday-cell':''}${cls(val)==='shabbat'?' shabbat-cell':''}${isEditor?' editable':''}`;
          mc+=`<div class="${cc}"${isEditor?` onclick="openEdit('${key}','${(val||'').replace(/'/g,"&#39;").replace(/\n/g,' ')}','${cat}')"`:''}>${tag(val)}${layers.length?badges(layers):''}${isEditor&&!val?'<span style="color:#ddd;font-size:0.66rem">+</span>':''}</div>`;
        });
        mc+=`</div>`;
      });
      mc+=`</div>`;
    });
    if(mc)html+=`<div class="month-sec"><div class="month-head">📅 ${month}</div>${mc}</div>`;
  });
  document.getElementById('main').innerHTML=html;
  applyLayers();
  if(!search)setTimeout(()=>{const el=document.getElementById(`week-${ci}`);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});},120);
}

function renderExam(data,search,prefix){
  const title=prefix==='bg'?'🎓 בגרויות ומתכונות':'📝 לוח מבחנים';
  let html=`<h2 style="font-size:0.96rem;font-weight:800;color:var(--accent);margin-bottom:16px">${title}</h2>`;
  const months={};
  data.forEach((w,wi)=>{const m=w.month||'כללי';if(!months[m])months[m]=[];months[m].push({w,wi});});
  Object.entries(months).forEach(([month,weeks])=>{
    html+=`<div class="month-sec"><div class="month-head">📅 ${month}</div>`;
    weeks.forEach(({w,wi})=>{
      html+=`<div class="exam-wrap"><table class="exam-tbl"><thead><tr><th>שכבה</th>`;
      w.dates.forEach((d,i)=>{const p=d?d.split(' * '):['',''];html+=`<th style="${i===6?'background:#1a4a2a':''}"><div>${DAY_NAMES[i]}</div><div>${isToday(d)?'🔵':''} ${p[0]||''}</div><div style="color:var(--accent2);font-size:0.6rem">${p[1]||''}</div></th>`;});
      html+=`</tr></thead><tbody>`;
      GRADE_LAYERS.forEach(grade=>{
        const evs=(w.grades||{})[grade]||Array(7).fill('');
        const hidden=!activeLayers.has(grade);
        html+=`<tr data-grade-row="${grade}"${hidden?' class="layer-hidden"':''}><td class="grade-td">${grade}</td>`;
        evs.forEach((ev,di)=>{
          const key=`${prefix}-${wi}-${grade}-${di}`;const val=getV(key,ev);
          const tc=cls(val)==='exam'?'exam-cell':'';
          html+=`<td class="${tc}"${isEditor?` onclick="openEdit('${key}','${(val||'').replace(/'/g,"&#39;")}','${grade}')"`:''}>${tag(val)||''}</td>`;
        });
        html+=`</tr>`;
      });
      html+=`</tbody></table></div>`;
    });
    html+=`</div>`;
  });
  document.getElementById('main').innerHTML=html;
  applyLayers();
}

// ═══ TAB ═══
function switchTab(tab){currentTab=tab;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById('tab-'+tab).classList.add('active');render();}

// ═══ NAV ═══
function jumpToMonth(val){if(!val)return;const months=[...new Set(SCHEDULE_DATA.map(w=>w.month).filter(Boolean))];const month=months[parseInt(val)];const idx=SCHEDULE_DATA.findIndex(w=>w.month===month);const el=document.getElementById(`week-${idx}`);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}
function jumpToToday(){const el=document.getElementById(`week-${findCW(SCHEDULE_DATA)}`);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});}

// ═══ AUTH ═══
function openLogin(){document.getElementById('login-modal').classList.add('open');setTimeout(()=>document.getElementById('pw-in').focus(),100);}
function doLogin(){
  if(document.getElementById('pw-in').value===EDIT_PASSWORD){
    isEditor=true;closeModal('login-modal');
    document.getElementById('edit-badge').style.display='';
    document.getElementById('login-btn').style.display='none';
    document.getElementById('logout-btn').style.display='';
    document.getElementById('save-btn').style.display='';
    showStatus('✅ מצב עריכה פעיל — לחץ על תא לעריכה');render();
  }else{document.getElementById('pw-err').style.display='block';}
}
function doLogout(){isEditor=false;document.getElementById('edit-badge').style.display='none';document.getElementById('login-btn').style.display='';document.getElementById('logout-btn').style.display='none';document.getElementById('save-btn').style.display='none';render();}
function closeModal(id){document.getElementById(id).classList.remove('open');}

// ═══ EDIT MODAL ═══
function openEdit(key,val,ctx){
  if(!isEditor)return;
  pendingEdit=key;
  document.getElementById('em-title').textContent=`✏️ עריכת אירוע — ${ctx}`;
  document.getElementById('em-text').value=val;
  const saved=getLayers(key);
  // Default: ALL UNCHECKED. Only check what was explicitly saved.
  document.getElementById('em-layers').innerHTML=GRADE_LAYERS.map(g=>{
    const checked=saved.includes(g)?'checked':'';
    return`<label class="lcheck"><input type="checkbox" name="gl" value="${g}" ${checked}><span class="gbadge ${GRADE_CSS[g]||''}" style="font-size:0.76rem;padding:2px 8px">${GRADE_LBL[g]||g}</span></label>`;
  }).join('');
  document.getElementById('event-modal').classList.add('open');
  setTimeout(()=>document.getElementById('em-text').focus(),100);
}
function saveEvent(){
  if(!pendingEdit)return;
  const key=pendingEdit;
  const text=document.getElementById('em-text').value;
  const checked=[...document.querySelectorAll('#em-layers input:checked')].map(i=>i.value);
  edits[key]=text; edits['layers_'+key]=checked.join(',');
  closeModal('event-modal');
  localStorage.setItem('sched_v3',JSON.stringify(edits));
  if(API_URL)pushAPI(key,text);
  showStatus('💾 נשמר');render();
}

// ═══ SAVE/API ═══
function saveEdits(){
  localStorage.setItem('sched_v3',JSON.stringify(edits));
  if(API_URL){showStatus('⏳ שומר...');Promise.all(Object.keys(edits).filter(k=>!k.startsWith('layers_')).map(k=>pushAPI(k,edits[k]))).then(()=>showStatus('✅ נשמר ב-Google!'));}
  else showStatus('💾 נשמר בדפדפן');
}
async function pushAPI(key,value){if(!API_URL)return;try{await fetch(API_URL,{method:'POST',body:JSON.stringify({password:EDIT_PASSWORD,action:'set',key,value})});}catch(e){}}

// ═══ EXCEL EXPORT ═══
function exportExcel(){
  let csv='\uFEFF';
  csv+='חודש,שבוע,יום,תאריך עברי,תאריך לועזי,'+CAT_ORDER.join(',')+'\n';
  SCHEDULE_DATA.forEach((week,wi)=>{
    week.dates.forEach((d,di)=>{
      const p=d?d.split(' * '):['',''];
      const row=[week.month,`${(week.dates[0]||'').split(' * ')[0]} - ${(week.dates[6]||'').split(' * ')[0]}`,DAY_NAMES[di],p[0]||'',p[1]||''];
      CAT_ORDER.forEach(cat=>{const ev=week.categories[cat]||[];const val=getV(`s-${wi}-${cat}-${di}`,ev[di]||'');row.push(`"${val.replace(/"/g,'""')}"`);});
      csv+=row.join(',')+'\n';
    });
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='לוח_שנה_תשפו.csv'; a.click();
  URL.revokeObjectURL(url);
  showStatus('📥 הקובץ הורד — פתח עם Excel');
}

// ═══ STATUS ═══
let stT;
function showStatus(msg){document.getElementById('status-msg').textContent=msg;document.getElementById('status-bar').classList.add('show');clearTimeout(stT);stT=setTimeout(hideStatus,4000);}
function hideStatus(){document.getElementById('status-bar').classList.remove('show');}

// ═══ BOOT ═══
buildLayersBar();
buildMonthSel();
render();
if(API_URL){
  fetch(API_URL+'?t='+Date.now()).then(r=>r.json()).then(res=>{
    if(res.ok&&res.data&&Object.keys(res.data).length>0){Object.assign(edits,res.data);localStorage.setItem('sched_v3',JSON.stringify(edits));render();}
  }).catch(()=>{});
}
</script>
