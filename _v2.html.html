<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח שנה תשפ"ו</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f1eb;
  --surface: #ffffff;
  --border: #ddd8cc;
  --text: #1c1812;
  --muted: #7a7269;
  --accent: #2c5f2e;
  --accent2: #c47b1a;
  --accent3: #8b2635;
  --header: #1c1812;
  --radius: 10px;
  --sh: 0 2px 12px rgba(0,0,0,0.07);
  --sh-lg: 0 8px 32px rgba(0,0,0,0.14);

  /* Category colors */
  --c-padagogi: #1a3a6b;
  --c-hevrati: #2c5f2e;
  --c-pnimiya: #7a2030;
  --c-rishhum: #4a4a6a;
  --c-yaatz: #3d6b4a;
  --c-acher: #5a4520;

  /* Grade colors */
  --c-z: #b55a00;
  --c-h: #006080;
  --c-t: #5a006b;
  --c-y: #006b3a;
  --c-ya: #3a006b;
  --c-yb: #6b2000;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); direction: rtl; min-height: 100vh; }

/* ── HEADER ── */
.header {
  background: var(--header);
  color: #fff;
  height: 60px;
  padding: 0 28px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 20px rgba(0,0,0,0.3);
}
.logo { font-size: 1.1rem; font-weight: 800; letter-spacing: 0.01em; }
.logo em { color: var(--accent2); font-style: normal; }
.header-right { display: flex; align-items: center; gap: 10px; }
.today-badge {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 0.78rem; color: rgba(255,255,255,0.75);
}

/* ── BUTTONS ── */
.btn {
  padding: 6px 16px; border: none; border-radius: 6px;
  cursor: pointer; font-family: 'Heebo', sans-serif;
  font-size: 0.83rem; font-weight: 600; transition: all 0.15s;
  white-space: nowrap;
}
.btn-ghost { background: transparent; border: 1.5px solid rgba(255,255,255,0.25); color: rgba(255,255,255,0.8); }
.btn-ghost:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.5); }
.btn-gold { background: var(--accent2); color: #fff; }
.btn-gold:hover { background: #b36e15; }
.btn-red { background: #b52828; color: #fff; }
.btn-red:hover { background: #9a2020; }
.btn-green { background: var(--accent); color: #fff; }
.btn-green:hover { background: #215022; }

/* ── TABS ── */
.tabs-bar {
  background: var(--surface);
  border-bottom: 2px solid var(--border);
  padding: 0 28px;
  display: flex; align-items: center; gap: 0;
  position: sticky; top: 60px; z-index: 150;
}
.tab-btn {
  padding: 14px 22px;
  border: none; background: transparent;
  font-family: 'Heebo', sans-serif; font-size: 0.9rem; font-weight: 600;
  color: var(--muted); cursor: pointer;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  transition: all 0.15s;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-btn:hover:not(.active) { color: var(--text); }
.tabs-spacer { flex: 1; }

/* ── LAYER TOGGLE BAR ── */
.layers-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 28px;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.layers-label { font-size: 0.78rem; font-weight: 700; color: var(--muted); margin-left: 4px; }
.layer-chip {
  padding: 5px 14px; border-radius: 20px; border: 2px solid;
  font-size: 0.78rem; font-weight: 700; cursor: pointer;
  transition: all 0.15s; user-select: none;
  opacity: 0.4;
}
.layer-chip.on { opacity: 1; }
.layer-chip[data-layer="פדגוגי"]  { border-color: var(--c-padagogi); color: var(--c-padagogi); }
.layer-chip[data-layer="פדגוגי"].on  { background: var(--c-padagogi); color: #fff; }
.layer-chip[data-layer="חברתי"]   { border-color: var(--c-hevrati);  color: var(--c-hevrati); }
.layer-chip[data-layer="חברתי"].on   { background: var(--c-hevrati);  color: #fff; }
.layer-chip[data-layer="פנימיה"]  { border-color: var(--c-pnimiya);  color: var(--c-pnimiya); }
.layer-chip[data-layer="פנימיה"].on  { background: var(--c-pnimiya);  color: #fff; }
.layer-chip[data-layer="רישום"]   { border-color: var(--c-rishhum);  color: var(--c-rishhum); }
.layer-chip[data-layer="רישום"].on   { background: var(--c-rishhum);  color: #fff; }
.layer-chip[data-layer="יעוץ"]    { border-color: var(--c-yaatz);    color: var(--c-yaatz); }
.layer-chip[data-layer="יעוץ"].on    { background: var(--c-yaatz);    color: #fff; }
.layer-chip[data-layer="אחר"]     { border-color: var(--c-acher);    color: var(--c-acher); }
.layer-chip[data-layer="אחר"].on     { background: var(--c-acher);    color: #fff; }
.layer-chip[data-layer="שכבת ז"]  { border-color: var(--c-z); color: var(--c-z); }
.layer-chip[data-layer="שכבת ז"].on  { background: var(--c-z); color: #fff; }
.layer-chip[data-layer="שכבת ח"]  { border-color: var(--c-h); color: var(--c-h); }
.layer-chip[data-layer="שכבת ח"].on  { background: var(--c-h); color: #fff; }
.layer-chip[data-layer="שכבת ט"]  { border-color: var(--c-t); color: var(--c-t); }
.layer-chip[data-layer="שכבת ט"].on  { background: var(--c-t); color: #fff; }
.layer-chip[data-layer='שכבת י']  { border-color: var(--c-y); color: var(--c-y); }
.layer-chip[data-layer='שכבת י'].on  { background: var(--c-y); color: #fff; }
.layer-chip[data-layer='שכבת י"א'] { border-color: var(--c-ya); color: var(--c-ya); }
.layer-chip[data-layer='שכבת י"א'].on { background: var(--c-ya); color: #fff; }
.layer-chip[data-layer='שכבת י"ב'] { border-color: var(--c-yb); color: var(--c-yb); }
.layer-chip[data-layer='שכבת י"ב'].on { background: var(--c-yb); color: #fff; }
.layer-divider { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
.layer-all-btn {
  padding: 4px 12px; border-radius: 20px; font-size: 0.75rem;
  font-weight: 700; cursor: pointer; border: 1.5px solid var(--border);
  background: var(--bg); color: var(--muted); transition: all 0.15s;
}
.layer-all-btn:hover { border-color: var(--text); color: var(--text); }

/* ── SEARCH BAR ── */
.search-bar {
  background: var(--bg);
  padding: 10px 28px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.search-wrap { position: relative; flex: 1; max-width: 340px; }
.search-wrap input {
  width: 100%; padding: 8px 36px 8px 12px;
  border: 1.5px solid var(--border); border-radius: 8px;
  font-family: 'Heebo', sans-serif; font-size: 0.88rem;
  background: var(--surface); outline: none; direction: rtl; text-align: right;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); }
.month-jump { padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'Heebo', sans-serif; font-size: 0.85rem; background: var(--surface); outline: none; cursor: pointer; }
.month-jump:focus { border-color: var(--accent); }
.jump-today-btn { font-size: 0.82rem; font-weight: 600; color: var(--accent); cursor: pointer; text-decoration: underline; background: none; border: none; font-family: 'Heebo', sans-serif; }

/* ── MAIN ── */
.main { padding: 20px 28px; max-width: 1480px; margin: 0 auto; }

/* ── CURRENT WEEK HERO ── */
.current-week-hero {
  background: linear-gradient(135deg, #1c1812 60%, #2c5f2e);
  border-radius: 14px;
  padding: 20px 24px;
  margin-bottom: 28px;
  color: #fff;
  display: flex; align-items: center; gap: 20px;
  box-shadow: var(--sh-lg);
}
.hero-badge {
  background: var(--accent2);
  border-radius: 10px;
  padding: 8px 18px;
  font-size: 0.75rem; font-weight: 800;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  white-space: nowrap;
}
.hero-dates { font-size: 1rem; font-weight: 700; }
.hero-sub { font-size: 0.8rem; color: rgba(255,255,255,0.55); margin-top: 3px; }
.hero-events { flex: 1; display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-start; }
.hero-event {
  background: rgba(255,255,255,0.12);
  border-radius: 6px; padding: 4px 12px;
  font-size: 0.78rem; font-weight: 500;
}

/* ── MONTH SECTION ── */
.month-sec { margin-bottom: 36px; }
.month-head {
  font-size: 1.05rem; font-weight: 800; color: var(--accent);
  padding: 8px 0 10px;
  border-bottom: 2px solid var(--accent);
  margin-bottom: 14px;
  display: flex; align-items: center; justify-content: space-between;
}

/* ── WEEK BLOCK ── */
.week-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
  box-shadow: var(--sh);
  scroll-margin-top: 160px;
}
.week-block.current-week {
  border: 2.5px solid var(--accent2);
  box-shadow: 0 0 0 4px rgba(196,123,26,0.12), var(--sh-lg);
}

/* dates header row */
.week-head {
  display: grid;
  grid-template-columns: 110px repeat(7, 1fr);
  background: var(--header);
}
.wh-label {
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; color: rgba(255,255,255,0.4); font-weight: 600;
  padding: 10px 4px;
  border-left: 1px solid rgba(255,255,255,0.06);
}
.wh-day {
  padding: 9px 6px; text-align: center;
  border-right: 1px solid rgba(255,255,255,0.06);
}
.wh-day.shabbat .wh-heb { color: #a8e6b0; }
.wh-heb { font-size: 0.76rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wh-sec { font-size: 0.65rem; color: var(--accent2); font-weight: 500; }
.wh-name { font-size: 0.62rem; color: rgba(255,255,255,0.4); }
.today-marker { display: inline-block; width: 6px; height: 6px; background: var(--accent2); border-radius: 50%; margin-right: 3px; vertical-align: middle; }

/* category row */
.cat-row {
  display: grid;
  grid-template-columns: 110px repeat(7, 1fr);
  border-top: 1px solid var(--border);
  transition: opacity 0.2s;
}
.cat-row.layer-hidden { display: none; }
.cat-lbl {
  display: flex; align-items: center; justify-content: center;
  padding: 7px 6px; font-size: 0.72rem; font-weight: 800;
  color: #fff; text-align: center;
  border-left: 1px solid rgba(255,255,255,0.15);
}
.cat-lbl.padagogi { background: var(--c-padagogi); }
.cat-lbl.hevrati  { background: var(--c-hevrati); }
.cat-lbl.pnimiya  { background: var(--c-pnimiya); }
.cat-lbl.rishhum  { background: var(--c-rishhum); }
.cat-lbl.yaatz    { background: var(--c-yaatz); }
.cat-lbl.acher    { background: var(--c-acher); }
.cat-lbl.other    { background: #555; }

.event-cell {
  padding: 6px 7px; min-height: 42px;
  border-right: 1px solid var(--border);
  font-size: 0.76rem; line-height: 1.4;
  vertical-align: top; position: relative;
}
.event-cell:last-child { border-right: none; }
.event-cell.holiday-cell { background: #fff5f5; }
.event-cell.shabbat-cell { background: #f2fbf3; }

.etag {
  display: inline-block; border-radius: 4px;
  padding: 2px 6px; font-size: 0.72rem; font-weight: 500;
  margin: 1px; line-height: 1.4;
}
.etag.general { background: #edf3ff; color: #1a3a6b; }
.etag.holiday { background: #fdecea; color: #7a1a1a; }
.etag.shabbat { background: #e8f5e9; color: #1a4a1a; }
.etag.exam    { background: #f3e5f5; color: #5a1a6b; }

/* grade chips on event tags */
.grade-dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  margin-left: 3px; vertical-align: middle;
}

/* edit mode */
.event-cell.editable { cursor: pointer; }
.event-cell.editable:hover { background: #fffbf0 !important; outline: 2px dashed var(--accent2); outline-offset: -2px; }
.event-cell.editing { outline: 2.5px solid var(--accent2) !important; background: #fffbf0 !important; }
.edit-ta {
  width: 100%; border: none; outline: none; resize: none;
  background: transparent; font-family: 'Heebo', sans-serif;
  font-size: 0.76rem; line-height: 1.4; direction: rtl; text-align: right;
  min-height: 36px;
}

/* ── EXAM/BAGRUT TABLE ── */
.exam-wrap { overflow-x: auto; margin-bottom: 12px; }
.exam-tbl {
  width: 100%; border-collapse: collapse;
  font-size: 0.76rem; min-width: 640px;
  border-radius: var(--radius); overflow: hidden;
  box-shadow: var(--sh);
}
.exam-tbl th {
  background: var(--header); color: #fff;
  padding: 8px 8px; text-align: center;
  font-weight: 600; font-size: 0.72rem;
  border-right: 1px solid rgba(255,255,255,0.08);
  white-space: nowrap;
}
.exam-tbl th.grade-th { min-width: 70px; }
.exam-tbl td {
  padding: 7px 7px; border: 1px solid var(--border);
  text-align: center; vertical-align: top; min-width: 70px;
}
.exam-tbl td.grade-td { background: #1a0a30; color: #fff; font-weight: 700; font-size: 0.72rem; }
.exam-tbl tr:hover td:not(.grade-td) { background: #fafff9; }
.exam-tbl td.exam-cell { background: #faf0ff; }
.exam-tbl td.bagrut-cell { background: #fff0e8; }
.exam-tbl td.matkon-cell { background: #f0f8ff; }
.exam-tbl td.grade-hidden { display: none; }
.exam-tbl th.grade-hidden { display: none; }

/* ── ADD EVENT MODAL ── */
.modal-ov {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 500;
  align-items: center; justify-content: center;
}
.modal-ov.open { display: flex; }
.modal {
  background: var(--surface); border-radius: 14px;
  padding: 28px 32px; width: 420px; max-width: 95vw;
  box-shadow: var(--sh-lg);
}
.modal h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 18px; }
.field-label { font-size: 0.8rem; font-weight: 700; color: var(--muted); margin-bottom: 5px; }
.field-input {
  width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
  border-radius: 8px; font-family: 'Heebo', sans-serif; font-size: 0.9rem;
  outline: none; direction: rtl; text-align: right; margin-bottom: 14px;
}
.field-input:focus { border-color: var(--accent); }
.layers-check-grid { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 16px; }
.layer-check-item { display: flex; align-items: center; gap: 6px; cursor: pointer; }
.layer-check-item input { cursor: pointer; }
.layer-check-item span { font-size: 0.82rem; font-weight: 600; }
.modal-actions { display: flex; gap: 10px; margin-top: 4px; }
.modal-actions .btn { flex: 1; }

/* ── LOGIN MODAL ── */
.login-modal { width: 340px; text-align: center; }
.login-modal h3 { margin-bottom: 8px; }
.login-modal p { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
#pw-err { color: #b52828; font-size: 0.82rem; margin-top: 8px; display: none; }

/* ── STATUS BAR ── */
.status-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--header); color: rgba(255,255,255,0.7);
  padding: 6px 28px; font-size: 0.78rem;
  display: flex; align-items: center; gap: 16px;
  z-index: 100; transform: translateY(100%); transition: transform 0.3s;
}
.status-bar.show { transform: translateY(0); }
.status-msg { flex: 1; }
.status-close { cursor: pointer; color: var(--accent2); font-weight: 700; }

/* ── EDIT BADGE ── */
.edit-badge {
  background: #fef3cd; border: 1.5px solid #f0c030; color: #7a5a00;
  border-radius: 6px; padding: 3px 10px; font-size: 0.75rem; font-weight: 700;
}

/* ── LOADING ── */
.loading { text-align: center; padding: 60px 20px; color: var(--muted); }
.spin { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── API STATUS ── */
.api-info {
  background: #fff8e8; border: 1.5px solid #f0c030; border-radius: 8px;
  padding: 10px 16px; margin-bottom: 16px; font-size: 0.82rem; color: #6a4a00;
}
.api-info strong { display: block; font-size: 0.88rem; margin-bottom: 3px; }

@media (max-width: 768px) {
  .header, .tabs-bar, .layers-bar, .search-bar, .main { padding-right: 14px; padding-left: 14px; }
  .week-head, .cat-row { grid-template-columns: 72px repeat(7, 1fr); }
  .cat-lbl { font-size: 0.58rem; padding: 4px 2px; }
  .current-week-hero { flex-direction: column; align-items: flex-start; gap: 10px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">לוח שנה <em>תשפ"ו</em></div>
  <div class="header-right">
    <span class="today-badge" id="today-badge">טוען...</span>
    <span class="edit-badge" id="edit-badge" style="display:none">✏️ מצב עריכה</span>
    <button class="btn btn-ghost" id="login-btn" onclick="openLogin()">כניסת עורך</button>
    <button class="btn btn-red" id="logout-btn" style="display:none" onclick="doLogout()">יציאה</button>
    <button class="btn btn-gold" id="save-btn" style="display:none" onclick="saveEdits()">💾 שמור</button>
  </div>
</header>

<!-- TABS -->
<div class="tabs-bar">
  <button class="tab-btn active" id="tab-loz" onclick="switchTab('loz')">📅 לו"ז כללי</button>
  <button class="tab-btn" id="tab-exams" onclick="switchTab('exams')">📝 מבחנים</button>
  <button class="tab-btn" id="tab-bagrut" onclick="switchTab('bagrut')">🎓 בגרויות ומתכונות</button>
  <div class="tabs-spacer"></div>
</div>

<!-- LAYERS BAR -->
<div class="layers-bar" id="layers-bar">
  <span class="layers-label">שכבות:</span>
  <!-- populated by JS -->
</div>

<!-- SEARCH BAR -->
<div class="search-bar">
  <div class="search-wrap">
    <input type="text" id="search-input" placeholder="חיפוש..." oninput="render()">
    <span class="search-ico">🔍</span>
  </div>
  <select class="month-jump" id="month-select" onchange="jumpToMonth(this.value)">
    <option value="">עבור לחודש...</option>
  </select>
  <button class="jump-today-btn" onclick="jumpToToday()">↩ השבוע הנוכחי</button>
</div>

<!-- MAIN -->
<main class="main" id="main">
  <div class="loading"><div class="spin"></div><p style="margin-top:12px">טוען נתונים...</p></div>
</main>

<!-- STATUS BAR -->
<div class="status-bar" id="status-bar">
  <span class="status-msg" id="status-msg"></span>
  <span class="status-close" onclick="hideStatus()">✕</span>
</div>

<!-- LOGIN MODAL -->
<div class="modal-ov" id="login-modal">
  <div class="modal login-modal">
    <h3>🔐 כניסת עורכים</h3>
    <p>הזן את סיסמת העריכה</p>
    <input class="field-input" type="password" id="pw-in" placeholder="סיסמה" onkeydown="if(event.key==='Enter')doLogin()">
    <div class="modal-actions">
      <button class="btn btn-ghost" style="border-color:#ccc;color:#333" onclick="closeModal('login-modal')">ביטול</button>
      <button class="btn btn-gold" onclick="doLogin()">כניסה</button>
    </div>
    <div id="pw-err">❌ סיסמה שגויה</div>
  </div>
</div>

<!-- ADD/EDIT EVENT MODAL -->
<div class="modal-ov" id="event-modal">
  <div class="modal">
    <h3 id="event-modal-title">✏️ עריכת אירוע</h3>
    <div class="field-label">תוכן האירוע</div>
    <textarea class="field-input" id="event-text" rows="3" placeholder="הכנס טקסט האירוע..."></textarea>
    <div class="field-label">לאיזה שכבות האירוע רלוונטי?</div>
    <div class="layers-check-grid" id="layers-checks"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" style="border-color:#ccc;color:#333" onclick="closeModal('event-modal')">ביטול</button>
      <button class="btn btn-green" onclick="saveEventModal()">שמור אירוע</button>

// ═══════════════════════════════════════════════════════
// DATE UTILITIES
// ═══════════════════════════════════════════════════════
function parseSecular(dateStr) {
  if (!dateStr) return null;
  const m = dateStr.match(/(\d{2})\.(\d{2})/);
  if (!m) return null;
  const year = parseInt(m[2]) <= 7 ? 2026 : 2025;
  return new Date(year, parseInt(m[2]) - 1, parseInt(m[1]));
}

function getWeekSunday(d) {
  const day = d.getDay();
  const diff = d.getDate() - day;
  return new Date(d.getFullYear(), d.getMonth(), diff);
}

function findCurrentWeekIndex(data) {
  const today = new Date();
  const sun = getWeekSunday(today);
  let best = 0, bestDiff = Infinity;
  data.forEach((week, i) => {
    const d = parseSecular(week.dates[0]);
    if (!d) return;
    const diff = Math.abs(d - sun);
    if (diff < bestDiff) { bestDiff = diff; best = i; }
  });
  return best;
}

function isToday(dateStr) {
  const d = parseSecular(dateStr);
  if (!d) return false;
  const t = new Date();
  return d.getFullYear() === t.getFullYear() && d.getMonth() === t.getMonth() && d.getDate() === t.getDate();
}

function formatToday() {
  const d = new Date();
  return d.toLocaleDateString('he-IL', { weekday:'long', day:'numeric', month:'long' });
}

function toggleLayer(layer) {
  if (activeLayers.has(layer)) activeLayers.delete(layer);
  else activeLayers.add(layer);
  document.querySelectorAll(`.layer-chip[data-layer="${CSS.escape(layer)}"]`).forEach(c => {
    c.classList.toggle('on', activeLayers.has(layer));
  });
  applyLayerVisibility();
}
function allLayers() {
  [...SCHEDULE_LAYERS, ...GRADE_LAYERS].forEach(l => activeLayers.add(l));
  document.querySelectorAll('.layer-chip').forEach(c => c.classList.add('on'));
  applyLayerVisibility();
}
function clearLayers() {
  activeLayers.clear();
  document.querySelectorAll('.layer-chip').forEach(c => c.classList.remove('on'));
  applyLayerVisibility();
}
function applyLayerVisibility() {
  // schedule cat rows
  document.querySelectorAll('.cat-row[data-cat]').forEach(row => {
    const cat = row.dataset.cat;
    row.classList.toggle('layer-hidden', !activeLayers.has(cat));

  document.querySelectorAll('[data-grade-row]').forEach(row => {
    const g = row.dataset.gradeRow;
    row.classList.toggle('layer-hidden', !activeLayers.has(g));
  });
  document.querySelectorAll('[data-grade-col]').forEach(el => {
    const g = el.dataset.gradeCol;
    el.classList.toggle('grade-hidden', !activeLayers.has(g));
  });
}

function classify(text) {
  if (!text || !text.trim()) return '';
  if (text.includes('בגרות') || text.includes('מתכונת')) return 'bagrut';
  if (text.includes('מבחן') || text.includes('מבדק') || text.includes('בוחן')) return 'exam';
  if (text.includes('חופשת') || text.includes('פסח') || text.includes('סוכות') || text.includes('חנוכה') || text.includes('פורים') || text.includes('ראש השנה') || text.includes('יום כיפור') || text.includes('שבועות') || text.includes('שמיני') || text.includes('הושענא') || text.includes('תשעה') || text.includes('צום')) return 'holiday';
  if (text.includes('פרשת') || text.includes('שבת')) return 'shabbat';
  return 'general';
}

function etagClass(type) {
  if (type === 'bagrut') return 'exam'; // purple
  if (type === 'exam') return 'exam';
  if (type === 'holiday') return 'holiday';
  if (type === 'shabbat') return 'shabbat';
  return 'general';
}

function renderTag(text) {
  if (!text || !text.trim()) return '';
  const t = classify(text);
  return `<span class="etag ${etagClass(t)}">${text.trim()}</span>`;
}

function catCssClass(cat) {
  const m = {'פדגוגי':'padagogi','חברתי':'hevrati','פנימיה':'pnimiya','רישום':'rishhum','יעוץ':'yaatz','יעוץ חנמ':'yaatz'};
  return m[cat] || 'acher';
}

  const currentWeekIdx = findCurrentWeekIndex(SCHEDULE_DATA);

  // Build hero
  const cw = SCHEDULE_DATA[currentWeekIdx];
  const heroEvents = [];
  Object.entries(cw.categories || {}).forEach(([cat, evts]) => {
    evts.forEach((ev, di) => {
      const v = getVal(`s-${currentWeekIdx}-${cat}-${di}`, ev);
      if (v && v.trim()) heroEvents.push(v.trim());
    });
  });
  let heroHtml = `<div class="current-week-hero">
    <div>
      <div class="hero-badge">📍 השבוע</div>
      <div class="hero-dates" style="margin-top:10px">${cw.dates[0]?.split(' * ')[0] || ''} – ${cw.dates[6]?.split(' * ')[0] || ''}</div>
      <div class="hero-sub">${cw.month || ''}</div>
    </div>
    <div class="hero-events">${heroEvents.slice(0,6).map(e=>`<span class="hero-event">${e}</span>`).join('')}</div>
  </div>`;

  // Group by month
  const months = {};
  SCHEDULE_DATA.forEach((week, wi) => {
    const m = week.month || 'כללי';
    if (!months[m]) months[m] = [];
    months[m].push({week, wi});
  });

  let html = heroHtml;

  if (!API_URL) {
    html += `<div class="api-info">
      <strong>⚡ מצב עבודה מקומי</strong>
      שינויים נשמרים בדפדפן בלבד. לשיתוף בזמן אמת — הכנס את URL של Apps Script בקוד (משתנה <code>API_URL</code>).
    </div>`;
  }

  Object.entries(months).forEach(([month, weeks]) => {
    let monthContent = '';
    weeks.forEach(({week, wi}) => {
      // search filter
      if (search) {
        let found = false;
        Object.entries(week.categories || {}).forEach(([cat, evts]) => {
          evts.forEach((ev, di) => {
            if (getVal(`s-${wi}-${cat}-${di}`, ev).toLowerCase().includes(search)) found = true;
          });
        });
        if (!found) return;
      }

      const isCurrent = wi === currentWeekIdx;
      monthContent += `<div class="week-block${isCurrent?' current-week':''}" id="week-${wi}">`;

      // Date header
      monthContent += `<div class="week-head"><div class="wh-label">שבוע</div>`;
      week.dates.forEach((d, i) => {
        const parts = d ? d.split(' * ') : ['',''];
        const todayMark = isToday(d) ? `<span class="today-marker"></span>` : '';
        monthContent += `<div class="wh-day${i===6?' shabbat':''}">
          <div class="wh-name">${DAY_NAMES[i]}</div>
          <div class="wh-heb">${todayMark}${parts[0]||''}</div>
          <div class="wh-sec">${parts[1]||''}</div>
        </div>`;
      });
      monthContent += `</div>`;

      // Cat rows
      Object.entries(week.categories || {}).forEach(([cat, events]) => {
        monthContent += `<div class="cat-row" data-cat="${cat}">`;
        monthContent += `<div class="cat-lbl ${catCssClass(cat)}">${cat}</div>`;
        events.forEach((ev, di) => {
          const key = `s-${wi}-${cat}-${di}`;
          const val = getVal(key, ev);
          const type = classify(val);
          const isHol = type === 'holiday';
          const isShab = type === 'shabbat';

          if (isEditor) {
            monthContent += `<div class="event-cell editable${isHol?' holiday-cell':''}${isShab?' shabbat-cell':''}"
              onclick="openEventModal('${key}','${(val||'').replace(/'/g,"&#39;").replace(/\n/g,' ')}','${cat}')">
              ${val ? renderTag(val) : '<span style="color:#ddd;font-size:0.7rem">+</span>'}
            </div>`;
          } else {
            monthContent += `<div class="event-cell${isHol?' holiday-cell':''}${isShab?' shabbat-cell':''}">
              ${renderTag(val)}
            </div>`;
          }
        });
        monthContent += `</div>`;
      });

      monthContent += `</div>`;
    });

    if (monthContent) {
      html += `<div class="month-sec">
        <div class="month-head"><span>📅 ${month}</span></div>
        ${monthContent}
      </div>`;
    }
  });

  document.getElementById('main').innerHTML = html;
  applyLayerVisibility();

  // Scroll to current week on first load
  if (!search) {
    setTimeout(() => {
      const el = document.getElementById(`week-${currentWeekIdx}`);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 120);
  }
}

function renderExamsTab(data, search, prefix) {
  const grades = ['שכבת ז','שכבת ח','שכבת ט','שכבת י','שכבת י"א','שכבת י"ב'];
  const title = prefix === 'bagrut' ? '🎓 בגרויות ומתכונות' : '📝 לוח מבחנים';
  let html = `<h2 style="font-size:1.1rem;font-weight:800;color:var(--accent);margin-bottom:20px">${title}</h2>`;

  const months = {};
  data.forEach((week, wi) => {
    const m = week.month || 'כללי';
    if (!months[m]) months[m] = [];
    months[m].push({week, wi});
  });

  Object.entries(months).forEach(([month, weeks]) => {
    html += `<div class="month-sec"><div class="month-head">📅 ${month}</div>`;
    weeks.forEach(({week, wi}) => {
      html += `<div class="exam-wrap"><table class="exam-tbl">`;
      html += `<thead><tr><th class="grade-th">שכבה</th>`;
      week.dates.forEach((d, i) => {
        const parts = d ? d.split(' * ') : ['',''];
        const todayMark = isToday(d) ? '🔵 ' : '';
        html += `<th data-grade-col="" style="${i===6?'background:#1a4a2a':''}">
          <div>${DAY_NAMES[i]}</div>
          <div>${todayMark}${parts[0]||''}</div>
          <div style="color:var(--accent2);font-size:0.65rem">${parts[1]||''}</div>
        </th>`;
      });
      html += `</tr></thead><tbody>`;

      grades.forEach(grade => {
        const events = (week.grades || {})[grade] || Array(7).fill('');
        html += `<tr data-grade-row="${grade}">`;
        html += `<td class="grade-td">${grade}</td>`;
        events.forEach((ev, di) => {
          const key = `${prefix}-${wi}-${grade}-${di}`;
          const val = getVal(key, ev);
          const type = classify(val);
          const cellCls = type === 'bagrut' ? 'bagrut-cell' : type === 'exam' ? 'exam-cell' : '';

          if (isEditor) {
            html += `<td class="${cellCls} editable" onclick="openEventModal('${key}','${(val||'').replace(/'/g,"&#39;")}','${grade}')">
              ${val ? renderTag(val) : '<span style="color:#eee">+</span>'}
            </td>`;
          } else {
            html += `<td class="${cellCls}">${renderTag(val)}</td>`;
          }
        });
        html += `</tr>`;
      });

      html += `</tbody></table></div>`;
    });
    html += `</div>`;
  });

  document.getElementById('main').innerHTML = html;
  applyLayerVisibility();
}

function jumpToMonth(val) {
  if (!val) return;
  const wi = parseInt(val) * 4; // rough
  // find first week of that month
  const month = [...new Set(SCHEDULE_DATA.map(w=>w.month).filter(Boolean))][parseInt(val)];
  const idx = SCHEDULE_DATA.findIndex(w => w.month === month);
  const el = document.getElementById(`week-${idx}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function jumpToToday() {
  const idx = findCurrentWeekIndex(SCHEDULE_DATA);
  const el = document.getElementById(`week-${idx}`);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// AUTH

function openLogin() { document.getElementById('login-modal').classList.add('open'); setTimeout(() => document.getElementById('pw-in').focus(), 100); }
function doLogin() {
  if (document.getElementById('pw-in').value === EDIT_PASSWORD) {
    isEditor = true;
    closeModal('login-modal');
    document.getElementById('edit-badge').style.display = '';
    document.getElementById('login-btn').style.display = 'none';
    document.getElementById('logout-btn').style.display = '';
    document.getElementById('save-btn').style.display = '';
    showStatus('✅ נכנסת למצב עריכה. לחץ על תא כדי לערוך.');
    render();
  } else {
    document.getElementById('pw-err').style.display = 'block';
  }
}
function doLogout() {
  isEditor = false;
  document.getElementById('edit-badge').style.display = 'none';
  document.getElementById('login-btn').style.display = '';
  document.getElementById('logout-btn').style.display = 'none';
  document.getElementById('save-btn').style.display = 'none';
  render();
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// ═══════════════════════════════════════════════════════
// EVENT EDIT MODAL
// ═══════════════════════════════════════════════════════
const ALL_LAYERS = [...SCHEDULE_LAYERS, ...GRADE_LAYERS];

function openEventModal(key, currentVal, context) {
  if (!isEditor) return;
  pendingEdit = { key };
  document.getElementById('event-modal-title').textContent = `✏️ עריכת אירוע — ${context}`;
  document.getElementById('event-text').value = currentVal;

  // Build layer checkboxes
  const savedLayers = getLayerVal(key);
  const checksDiv = document.getElementById('layers-checks');
  checksDiv.innerHTML = ALL_LAYERS.map(l => {
    const checked = savedLayers.length === 0 || savedLayers.includes(l) ? 'checked' : '';
    return `<label class="layer-check-item">
      <input type="checkbox" name="layer" value="${l}" ${checked}>
      <span>${l}</span>
    </label>`;
  }).join('');

  document.getElementById('event-modal').classList.add('open');
  setTimeout(() => document.getElementById('event-text').focus(), 100);
}

function saveEventModal() {
  if (!pendingEdit) return;
  const key = pendingEdit.key;
  const text = document.getElementById('event-text').value;
  const checked = [...document.querySelectorAll('#layers-checks input:checked')].map(i => i.value);

  edits[key] = text;
  edits['layers_' + key] = checked.join(',');

  closeModal('event-modal');
  
  // Save to API if available, fallback to localStorage
  if (API_URL) {
    pushToAPI(key, text).then(() => showStatus('✅ נשמר ב-Google Sheets'));
  }
  localStorage.setItem('sched_edits_v2', JSON.stringify(edits));
  showStatus('💾 נשמר (לחץ "שמור" לשמירה סופית)');
  render();
}

// ═══════════════════════════════════════════════════════
// SAVE / API
// ═══════════════════════════════════════════════════════
function saveEdits() {
  localStorage.setItem('sched_edits_v2', JSON.stringify(edits));
  if (API_URL) {
    showStatus('⏳ שומר ב-Google Sheets...');
    Promise.all(Object.keys(edits).filter(k => !k.startsWith('layers_')).map(k =>
      pushToAPI(k, edits[k])
    )).then(() => showStatus('✅ כל השינויים נשמרו ב-Google Sheets!'));
  } else {
    showStatus('💾 נשמר בדפדפן. לשיתוף — הגדר API_URL.');
  }
}

async function pushToAPI(key, value) {
  if (!API_URL) return;
  try {
    const [prefix, wi, cat, di] = key.split('-');
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        password: EDIT_PASSWORD,
        sheetName: prefix === 's' ? 'schedule' : (prefix === 'bagrut' ? 'bagrut' : 'exams'),
        week_id: wi, field: `${cat}_${di}`, value
      })
    });
  } catch(e) { console.warn('API error', e); }
}

// ═══════════════════════════════════════════════════════
// STATUS
// ═══════════════════════════════════════════════════════
let statusTimer;
function showStatus(msg) {
  document.getElementById('status-msg').textContent = msg;
  document.getElementById('status-bar').classList.add('show');
  clearTimeout(statusTimer);
  statusTimer = setTimeout(hideStatus, 4000);
}
function hideStatus() { document.getElementById('status-bar').classList.remove('show'); }
